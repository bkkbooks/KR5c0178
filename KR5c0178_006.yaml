front:
  text: 昌言十卷豫章記曰隋開皇間改豫章為洪州先生蓋上古有道之士復見於隋唐間云按真誥洪崖先生今為青城真人墓在武威姑臧縣五代
  hash: sha256:0b69c2ff227d9145de2ef18e10f72a640c093ac7189975e4e8f4d1ab9f8d2769
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0178_HFL_006-001a, image: hfl/0559/0559-014.png}
body:
  text: 道言張薦明少以儒學遊河朔後去為道士通老子莊周之說晋高祖召見問道家可以治國乎對曰道者妙萬物以為言得其極者尸居衽席之間可以治天地也祖大其言延入內殿講道德經拜以為師薦明聞宫中奏時鼓曰陛下聞鼓乎其聲一而已五音十二律鼓無一焉然和之者鼓也夫一萬事之本也能守一者可以治天下祖益善之賜號通玄先生道華鄭遨字雲叟滑州人敏於文辭唐昭宗時舉進士不中見天下已亂拂衣遠去乃入少室山為道士聞華山五粒松脂瀹入地千歲化為藥能去三尸因徙居華陰求之與道士李道殷羅隱之友善遨種田隱之賣藥以自給道殷有釣魚術鈎而不餌又能化石為金遨嘗驗其信然而不之求也世自為三高士節度使劉凝以寶貨遺之一無所受唐明宗召以左拾遺晋高祖召以諫議大夫皆不應賜號逍遙先生天福四年卒年七十四遨好飲酒奕棋為詩章寫縑素人間傳為寶玩或圖其形于屋壁瞻禮之跡雖遠而名愈彰與夫石門荷蓧之徒異矣道質閭丘方遠字大方舒州宿松人幼慧辨學易於盧山陳玄悟問大㫖於香林左玄澤澤奇之後居仙都山隱真巖從劉處靖修出世之術而子史群書不忘披覽嘗自言葛稚川陶貞白吾之師友也詮太平經為三十篇備盡樞要唐景福二年錢鏐謁于餘杭大滌洞築室以安之表上其行業昭宗纍徵之方遠以天文推尋秦地將欲荆棘唐祚當革侔之園綺無出山林竟不起乃降詔褒異就頒命服賜號妙有大師玄同先生由是真靈事跡顯聞吳楚門下弟子二百餘人廣平程紫霄應召於秦宫新安聶師道行教於吳國安定胡謙光魯國孔宗魯皆得其奧者天復二年二月十四日沐浴端坐而化葬于大滌之白鹿洞錢武肅王夢騎鶴訪别道質聶師道字宗微新安歙人也性穎悟真淳言行謙謹養親以孝聞師閭丘大方即郡之東山建問政山房嘗覽內傳見服松脂法入百丈山採松脂遇蔡真人父子及彭真人一入山遽逢三仙人一日夜人間月餘矣其實精習之命也師道深自嘆異每林中拾薪斸藥虎豹弭尾從之或以薪藥負其背上送歸而去歙之近山獸不傷人皆師道有以感之也母問師道遊學所益具陳其事喜而曰汝以孝養我以道資我何幸為汝母矣此蓋宿慶所及出遊南嶽九嶷擬尋梅真人蕭侍郎於玉笥梅即南昌尉福蕭即子雲字景喬梁之公子自東陽太守避侯景亂全家入山二君俱得道此山一日遊郁木坑乃遇謝通修自言本居南嶽與彭蔡同隱携至所居授以素書一通復還問政三十餘年每焚修即以彭蔡謝真形瞻禮吳太帝霸江淮聞其名徵至廣陵建玄元宫為所居賜號逍遙大師問政先生居廣陵又三十年弟子五百餘人後乃隱化而往絶世思望而問政山屢有雲鶴見歙之鄉里親族以為師道之還故鄉若令威之歸華表也有詔褒贈曰詢諸贈典繫乃彝章啓有厥由子何不舉故淮浙宣歙管內道門威儀逍遙大師問政先生為國焚修大德賜紫聶師道早通玄理夙契真風野鶴不群孤雲自在昔太祖創基之際已命焚修及元勳匡國之初早曾瞻敬眷言素業實冠玄關雖升遐屢歷於光陰而遺懿益隆於寰宇況教門上請台輔奏陳且將啓玄墟即回故里是用加之峻秧錫以崇階式表休恩庶昭往行可贈銀青光祿大夫鴻臚卿問政先生宋道品陳摶字圖南譙郡人小時戲渦水上有青衣嫗抱乳之曰令汝永無嗜欲聰明過人唐長興中舉進士不第去隱武當山辟穀鍊氣作詩八十一章號指玄篇後唐明宗封為清虛處士俄徙華山雲臺觀常閉門卧纍月不起周世宗召至禁中驗之信然顯德末乘白騾將入東都聞宋太祖即位大笑曰天下定矣太宗時召之圖南疏辭曰臣性同猿鳥心若死灰不曉仁義之淺深安識禮儀之去就敗荷作服脫籜為冠體有青毛足無草履苟臨軒陛貽笑聖明太宗再遣中謁者必起之且賜詩曰曾向前朝出白雲後來消息杳無聞如今若肯隨徵召盡把三峯乞與君圖南不得已詣闕冠華陽巾躡草履羽服垂紳以賔禮見賜號希夷先生遺詣中書堂使謂宰相宋琪等曰摶獨善其身不干勢利入華山已四十年計近百歲以天下治安故來朝覲亦可念也琪等遂問修養之道答曰聖上有天日之表正君臣合德圖治之時勤行修鍊何以加此士大夫日往乞善言皆答曰優遊之所勿久戀得志之處勿再往識者韙之圖南淹通群經而尤精易學蓋以授弟子穆修修傳李之才之才傳康節先生邵雍又以太極圖授种放放傳穆修穆修傳濓溪先生周茂叔圖南以故數發機先語後所以然者世傳其有人倫風鑒始太祖居潜曰與趙忠獻公遊長安市圖南遇諸途曰可飲乎太祖曰願與趙學究俱圖南睥睨之曰亦可也既至酒家忠獻苦足痺亟就右坐圖南詬曰紫微垣一小星敢上次乎引而下之其召也太宗令見壽王圖南及門而還曰王門厮役皆將相具何必見王由是太宗屬意真宗矣端拱二年豫知其終以表來上曰大數有終聖時難戀命弟子賈德升於張超谷鑿石室室成而逝彌月五色雲蔽山谷不散道儒王昭素酸棗人也早學道尤邃於易嘗曰坤為十月卦十月純陰用事猶有陽氣在內故薺麥先生直至坤卦之末尚有龍戰之象龍亦陽也則知陽無剝盡之理蓋陰陽者剛柔迭用變化日新生生所資而無盡者也其於道深矣鄉人尊其行有訟不之官府而獨詣决焉開寶二年召至講易踰月求歸特授國子博士以禮餞之時已耄矣至九十餘乃卒其首縮入腹中世言其能龜息云道言澄隱字棲真常山人通內外學太祖征太原還幸其居棲真時年八十容色甚少太祖問其養生者對曰臣養生則精思鍊氣耳帝王則異於是老子曰我無為而民自化我清靜而民自正無為無欲凝神太和黃帝陶唐享國永年得此道也帝大悅其亦孫思邈之流乎道言張無夢字靈隱鳳翔盩厔人也與种放劉海蟾為方外交遊天台赤城廬於瓊臺嘗曰一者道之用也其要則無方無體無用無為無為無不為矣飛蠕蠢類皆含道性得其道者無所不變小則糞蟲變蜩大則人可變仙矣於是觀天地變化草木盛衰風雲捲舒日月還轉水火相激陰陽相摩之理著還元百篇真宗召見問以長生久視之㫖對曰臣居山中但誦易經老子書而已不知其他因命講易即說謙卦上曰獨說謙何也對曰方當大有之時宜守之以謙上深然之復命講還元篇曰國猶心耳心無為則氣和氣和則萬寶結矣心有為則氣亂氣亂則英華散矣此還源之大綱也真宗嗟異之賜秩著作郎辭不受力丐還山後卒於金陵年九十九碧虛子陳景元其弟子也道言劉烈九江人幼好道遇異人建隆中得道者因結廬廬山密修其道自號虛谷子往有談景升者作化書烈提其要曰太虛茫茫而有涯太上浩浩而有家得灝氣之門所以收其根知元神之囊所以韜其光若蚌內守而石內藏藏之為元精用之為萬靈含之為太一放之為太清大率以柱下漆園黃庭為宗嘗謂學道者萬物不能遷其性一心湛然而無思時導其氣則百骸皆適抱純白養太玄然後不入其機則知神之所守氣之所生精之所復何行而不至哉道言張乾曜漢天師二十四代孫也天聖八年召至闕下仁宗問以白日冲舉事對曰此非所以輔政教也陛下苟能返古之朴行以簡易志盧清明神氣完和矣奚事冲舉上嘉之賜號澄素先生道質傅霖青州人少與張忠定公詠同學忠定既貴求之三十年不可得嘗慨思其人作詩以志其意晚年守宛丘有被褐跨驢叩戟門大呼曰語尚書青州傅霖來閽吏走白其言忠定怒曰傅先生天下名士汝何人敢斥名氏乎霖笑曰別子一世尚爾童心是豈知世間有我哉忠定問曰何昔隱今出耶曰子將去矣來報子耳忠定曰詠亦自知之曰知復何言遂别去不告所往踰月忠定卒道默率子廉衡山農夫也愚朴不遜衆謂之率牛晚入南嶽觀為道士觀西南七里有紫虛閣故魏夫人壇也道士以其荒寂莫肯居者唯子廉樂居之端默而已人莫見其所為然頗嗜酒往往醉卧山林間雖大風雨不知虎狼過其前不害也故禮部侍郎王公祜出守長沙奉詔禱南嶽謁魏夫人壇子廉方醉卧不能起直視公曰村道士愛酒不能常得得輒徑醉官人怒之王公察其異載與歸月餘落莫無所言復送還山曰尊師韜光內映老夫所不測也當以詩奉贈既而忘之一日晝寢夢子廉來索詩乃作二絶句書版置閣上衆道士驚日率牛何以得此太平興國五年六月二十七日忽謂觀中人曰吾將有所適閣不可無人當速遣繼我者衆益驚曰天暑如此率牛安往狼狽視之則死矣始大異之曰率牛乃知死日耶即葬嶽下未幾南臺寺僧守澄自東都還遇子廉南薰門外神氣清舉守澄問何故出山笑曰間遊耳寄書與山中人澄歸乃知其死驗其書則死日也發其冢杖屨而已道術趙吉代州人既得道行丐高安城中故為不潔清者元豐三年蘇轍子由謫高安忽過子由曰吾知君好道而未識其要陽不降陰不升肉多而浮面赤而瘍教君挽水溉百骸浹日諸疾除矣苟不怠度世可也子由用其言驗他日問及養性告曰亦嘗夢乎方其夢也亦有存殁憂樂之知乎曰是不可常也吉笑曰有夢覺之異則性不全矣子由矍然異焉知其誠有道者吉自言往在廣陵為同學蔣生毒其兩目遂翳然時能脫翳見童子碧子炯炯其臍以上骨如龜心以下如鏵兩骨相值其間不合如指時蓋百二十七歲矣後至興國軍太守楊繪元素留之居無幾俄為所畜驃踶而死元素為葬之元祐元年蜀沙門法震來見大蘇公東都曰法震至雲安酒家見丐者云吾姓趙頃識蘇公黃州幸為我多問子由聞之驚問其狀知為吉也興國軍太守朱彥博子時在坐歸告其父發其藏唯一杖兩脛在耳道書稱尸解之下者留足一骨豈謂是耶道言李昊劍州人善符禁陳述古知陳州官舍多鬼因空所舍堂致昊鬼即止蘇轍子由詰曰何能爾耶昊曰彼多欲故鬼侮之吾斷欲久非有他也間從問所以養生者答曰人禀天地五行以生與天地均五行之運於天地無窮而人壽不過百年者自戕之耳夫生而知物我之辨內而在我外而在物物我之情不忘於心我與物為二則所受五行之氣判然與五行大分不通因其所受厚薄各盡所有而止故或壽或夭今誠忘物我之異使是身與天地相通如一則五行之氣中外流注而不竭安有不長生者哉道華朱自英字隱芝句曲朱陽里人生於太平興國元年八九歲從牧兒郭干村能吹笛致鶴父母以為不祥棄之乃從茅山朱元吉著道士服時年十二端拱之初也繼與明真張鍊師居積金山頂試辟穀術人稍趨之遂思遠遊至襄陽遇異人陳鐵腳挾往青城山復過瀨鄉校讎太清宫古藏經遇水星童子武仙童名抱一挾往河中府謂此行已抵太陰鍊形一度行止神變景德元年嗣茅山經籙二十三代真宗遣使祈胤山中明年生仁宗事具宋史奉㫖住持玉清昭應宫敕建乾元天聖兩觀賜號國師明肅太后傳大洞畢法加號觀妙先生還山因得抱一蜀中所寄書意警責姓名顯耀暴露天機先生對之泣數行下弟子莫測也天聖七年十一月坐蛻于乾元手執祥符所賜玉如意汗流浹體額有凝珠尸解之上者道品劉混康字混康晋陵人嘉祐五年試經為道士一夕夢神人告曰汝欲學道當擇名山嘗患世無良師每散髮登壇以天為宗已而聞茅山毛宗師有道一見授以經籙庵居積金峰一日三羽士造其廬指庵之東隅曰汝即此以居抱神守中德惠及人當無愧古人也又顧其額間曰此無作之地道之所尚不可以有疵手為捫之明日瘢滅元祐元年哲宗聞其名以高道召敕住上清儲祥宫紹聖四年敕江寧府即所居潜神庵為元符觀别敕三茅山宗壇與信州龍虎山臨江軍閣皂山為經籙三山云徽宗益大其觀加號元符萬寧宫賜九老仙都君玉印玉櫑具景震劍御書畫寶賜不一先生纍表灾變上雖加嘆而不能用其言大觀二年再召出山群鹿遮道一鹿觸車而斃命瘞之道左先是所蓄鶴聞召飛去先生曰鶴去鹿斃吾無還期四月至京館于新作元符之别觀夜夢天帝召詰朝駕幸進上所誦大洞經十七日丁酉倏然解化年七十二敕建藏真觀於葬所纍加至葆真觀妙冲和先生贈太中大夫諡靜一道言查淨之字清遠金陵人父携入茅山劉先生見而奇之曰此子他日人天師也師喜躍誓不復歸遂為入室弟子元祐間從劉先生入朝先生被㫖住儲祥宫以師歸主元符宫事政和三年七月三日召門弟子曰吾今年四十六歲昔先師授記以為過叨朝廷厚恩壽當不逾於此遂命修遺表捉筆親題表後云陛下天縱聖哲尊道崇德自古帝王未有過者然念帝王奉道與臣庶不同一言一動上合天心則萬方蒙恩太上五千言以去奢去泰慈儉為先乃陛下之師寶致道之津梁也伏願陛下清心寡欲以保聖躬節財儉用以固邦本聽納忠良以廣言路天下幸甚如臣下愚固不當冒死陳詞實念先師付託之重嘗令臣以盡忠報國為先當今之際不進一言以禆聖德則臣違天負師抱恨泉壤矣操筆陳情伏增感愴臣淨之再言押書畢而逝表聞徽宗嗟悼不已以其表降付藏真觀刻石山中道化徐守信海陵人為天慶觀傭役服弊布衣曳繩屨或跣行終日無所為惟執帚掃除且誦度人經不絶口有道士徐元吉他方來病癩甚衆厭惡弗肯與處斥居觀後茅廬中守信獨事之謹元吉已而死丐錢為斂葬既巳歸茅廬哭三日出而佯狂稍稍有異事人皆神之稱為神翁始知得道於癩道士也自是四方多來問灾祥哲宗不豫遣香至神翁所翁書吉人以進未幾徽宗嗣位崇寧初召之不肯起强輿至東都復不可留乃禮歸之即海陵為建仙源萬壽宫使居焉大觀二年召赴闕四月十七日聞茅山劉先生化于儲祥之别觀乃曰劉先生去我亦去矣即二十日庚子解去故降詔語有云誠意感通異人沓至了然委化不約而同贈太中大夫與劉先生誥無異詞也道品張繼先漢天師三十代孫先生九歲得其法淵默寡言清癯白晢眉目真天人也徽宗遣使召之既至秩以碧虛大夫先生方十三歲辭不受崇寧四年再召命弭解州鹽池怪事甚神異賜號虛靖先生政和中大內灾命醮欀之因奏紅羊赤馬之厄其語祕靖康初虜引去出塞朝廷再遣使與郡太守詣先生廬致召必起之先生行至餘杭而色憂不怡人莫之測已而乃聞虜復入寇急召入朝至泗州天慶觀端坐化去年三十六實丁未歲也後薩道人守堅復遇先生青城山高宗命設像於內中觀堂所著大道歌心說傳于世道言劉高尚濱州安定人家世為農九歲不茹葷後稍稍不語問以事則書而對其語初若不可曉已而輒驗家人為築别室以居久之言皆響應遠近以為神徽宗三使往聘之辭疾不奉詔賜號高尚處士建觀以居其徒因以其號名之靖康之亂虜人見高尚皆下馬羅拜不敢入其里高尚嘗有言曰世之人以嗜欲殺身以貨財殺子孫以政事殺人以學術殺天下後世識者以為名言周少隱既為之傳又推廣其言而為之說以為此古博大真人所以救溺起死還真之論豈世俗工言語文章者所能至哉先生農家子未嘗讀書事師而有是言豈神仙中之深知道者乎蓋又與夫熊經鳥伸吐故納新區區積歲月之功而欲著名於仙籍者固有間矣道言王道堅龍虎山道士政和間徵赴闕館于太一宫徽宗問以修鍊延年之術奏曰清靜無為軒黃所以致治多欲求仙漢武所以罔功夫修鍊非天子事也時方校定道藏經制授太素大夫凝神殿校籍同校定道經徽宗豫知國當有厄命道堅禳之奏曰修德可以回天禬禳之事不敢誤國力請還山紹興初高宗復遣使召先一日道堅鳴鼓集大衆舉頌有為報長安使休尋海上山比使至已化去矣道術留用光信州貴溪人貌奇古而黔既壯無所聞往遊南嶽至撫州臨川縣路逢一道人自言是張輔元與用光偕行用光行為張負止為張炊次長沙張謂曰子事吾勤亦至矣向吾慢子觀子之變子益加敬吾今入蜀有一篇授子子其祕之遂去啓視乃五雷書慶元間衢州旱郡守沈作礪夜夢黑龍蟠于城隍廟門旦視之乃用光醉卧也即延命禱雨而雨郡上其事復禱雨于朝亦雨用光年幾四十未得度為道士至是即御前賜冠服賜號冲靖先生寧宗為出內帑錢撤上清宫新而大之理宗立復召用光謂使者曰歸奏天子治天下者道德五千言足矣山林野人來將奚益竟解化龍虎山中向之所遇張輔元或謂為漢天師也玄品録卷之五
