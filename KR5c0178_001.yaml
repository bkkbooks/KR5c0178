front:
  text: 玄品録卷之一
  hash: sha256:ea5b629000beda029191a06bfd0479e690e13724054b26be449a9b0645785743
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0178_HFL_001-001a, image: hfl/0558/0558-006.png}
body:
  text: 句曲外史吳郡海昌張天雨集道德品周尹喜周大夫也善內學常服精華隱德修行時人莫之知老子西遊喜先見其氣知有真人當過物色而遮之果得老子老子亦知其奇為著道德上下篇授之後與老子俱之流沙服巨勝實莫知其終喜亦著書九篇號曰關尹子劉向稱其渾質崖戾汪洋大肆然有式則使人泠泠輕輕不使人狂莊子亦載其語曰在己無居形物自著其動若水其靜若鏡其應若響芴乎若亡寂乎若清同焉者和得焉者先未嘗先人而嘗隨人稱為古之博大真人本號文始先生尹軌字公度太原人文始先生從弟也博學五經尤明天文圖緯及授諸道經凡百餘篇常服黃精餌初文始遇老子函谷關以周康王昭王時於終南作草樓以居至穆王修其草樓改為樓觀以待有道之士公度遂與隱士杜沖修習其處得道為太和真人杜沖字玄逸鎬京人以周昭王丁巳年聞文始登真乃於靈宅栖玄學道于時幽人逸士自遠而至者有五人焉並沉默虛遠方雅高素道術相忘共弘不伐之則也穆王所以為修觀立祠置沖為道士焉年一百二十餘得道升舉號太極真人辛汧一名計然葵丘濮上人也師事老子博學無所不通楚平王問曰聞子得道於老子可得聞乎對曰道德匡邪以為正振亂以為治醇德復生天下安寧要在一人故積德成王積怨成亡堯舜以是昌桀紂以是殃王曰敬聞命矣後南遊吳越范蠡師之越欲伐吳蠡諫曰臣聞之師曰兵凶器戰逆德爭者事之末也陰謀逆德好用凶器試身於所末不可勾踐不聽敗於夫椒後位以上大夫弗就隱吳興餘不之禺山著書一十二卷自號文子其辭旨皆本之老子柳子厚嘗為刊削頗發其意有曰神者智之淵神清則智明智者心之府智公則心平又曰上學以神聽之中學以心聽之下學以耳聽之又曰貴則觀其所舉富則觀其所欲貧則觀其所受又曰人性欲平嗜欲害之亦文子之一臠也天寶中號文子通玄真人書曰通玄真經陸通楚狂接輿也好養生採食橐盧木實及蕪菁子遊諸名山歷數百年人猶見之孔子將之楚接輿歌而過孔子曰鳳兮鳳兮何德之衰往者不可諫來者猶可追已而已而今之從政者殆而孔子下欲與之言趨而避之不得與之言庚桑楚陳人為老子之役偏得老子之道居畏壘之山其臣之畫然知者去之其妾之潔然仁者遠之擁腫之與居鞅掌之為使居三年畏壘大壤後遊吳隱毗陵盂峰沽洞靈觀其處也著書九篇號庚桑孑一名亢倉子其書亡至唐開元王褒獻其書因封洞靈真人書曰洞靈真經南榮趎見老子老子曰何與人偕來之衆也趎懼然顧其後老子曰子不知吾所謂乎趎俯而慙仰而嘆曰今者吾忘吾答因失吾問老子曰何謂也曰不知乎人謂我朱愚知乎反愁我軀不仁則害人仁則反愁我身不義則傷彼義則反愁我已我安逃此而可老子曰能抱一乎能勿失乎能舍諸人而求諸己乎能翛然乎能侗然乎能兒子乎兒子動不知所為行不知所之身若稿木之枝而心若死灰若是者福亦不至禍亦不來福禍無有惡有人災初趎師庚桑子子曰吾才小不足以化子子胡不南見老子故趎見老子曰願因楚而問之尹文學老子之道作華山之冠以自表其為道不纍於俗不飾於物願天下之安寧以活民命人我之養畢足而止見侮不辱救民之鬥禁攻寢兵救世之戰以此周行天下上説下教不忘天下者也書二篇曰尹文子士成綺周隱君子也百舍重趼而見老子曰吾聞夫子聖人也吾固不辭遠道而來敢問修身老子曰夫道於大不終於小不遺廣乎其無不容也淵乎其不可測也夫至人極物之真能守其本故外天地遺萬物而神未嘗困也士成綺有得焉崔瞿周之賢大夫也問於老子曰不治天下安臧人心老子曰汝愼無攖人心人心排下而進上上下囚殺其熱焦火其寒凝冰其疾俯仰之間而再撫四海之外其居也淵而靜其動也縣而天僨驕而不可繫者其唯人心乎昔者黃帝始以仁義攖人心施及三王而天下大駭矣於是乎喜怒相疑愚知相欺善不相非誕信相譏而天下衰矣大德不同而性命爛漫矣天下好知而百姓求竭矣於是乎釿鋸制焉繩墨殺焉椎鑿決焉天下脊脊大亂罪在攖人心蓋老子僨德下衰因崔瞿之問而驚世云柏矩周之卿士學於老子遊齊見辜人焉解朝服而幕之號天而哭之曰子乎子乎天下有大災子獨先離之曰莫為盜莫為殺人榮辱立然後睹所病貨財聚然後睹所爭窮困人之身使無休時欲無至此得乎古之君天下者以得為在民以失為在己以正為在民以枉為在己故一物有失其形者退而自責今則不然匿為物而愚不識大為難而罪不敢重為任而罰不勝遠其途而誅不至民知力竭則以偽繼之日出多偽士民安取不偽夫力不足則偽知不足則欺財不足則盜盜竊之行於誰責而可乎柏矩之言得於老子為多列禦寇鄭人與鄭繻公同時其學以黃帝老子為宗居鄭圃四十年人無識者初事壺丘子後師老啇氏而友伯昏無人進二子之道九年而後能御風而行弟子嚴恢問曰所有問道者為富乎列子曰桀紂唯輕道而重利是以亡列子窮容貌有飢色客有言之鄭子陽者曰列禦寇蓋有道之士也居君之國而窮君無乃為不好士乎鄭子陽即令官遺之粟列子出見使者再拜而辭使者去列子入其妻望之而拊心曰妾聞為有道者妻子皆得逸樂今有飢色君過而饋先生食先生不受豈不命也哉列子笑謂之曰君非自知我也以人之言而遺我粟至其罪我也且又以人之言此吾所以不受也其卒民果作難而殺子陽著書舊二十篇劉向去重復存者八篇號曰道家道家者秉要執本清虛無為及其治身務崇不競合於六經云唐開元號其書曰沖虛至德真經宋宣和加列子號沖虛觀妙真君莊周字子休梁惠王時為蒙漆園吏學無所不窺然其要本歸於老子之言故其著書十餘萬言大抵率寓言也楚威王聞其賢使使厚幣迎之許以為相周笑謂使者曰千金重利卿相重位也子獨不見郊祭之犧牛乎養食之數歲衣以文繡以入太廟當是之時欲為孤豚其可得乎子亟去毋污我終身不仕以快吾志焉其書以莊子名其自敘曰寂漠無形變化無常死與生與天地並與神明往與茫乎何之忽乎何適萬物畢羅莫足以歸古之道術有在於是者莊周開其風而悅之以繆悠之説荒唐之言無端崖之辭時縱恣而不儻不以觭見之也以天下沉濁不可與莊語以巵言為曼衍以重言為真以寓言為廣獨與天地精神往來而不敖倪於萬物不遣是非以與世俗處其書雖環瑋而連犿無傷也其辭雖參差而諔詭可觀彼其充實不可以已上與造物者遊而下與外生死無終始者為友其於本也弘大而闢深閎而肆其於宗也可謂調適而上遂矣雖然其應於化而解於物也其理不竭其來不蛻茫乎昧乎未之盡者按真誥莊周師長桑公子授其微言謂之莊子隱於抱犢山上補太極闈編郎世號其書曰南華真經宋宣和加號微妙元通真君范蠡字少伯徐人也事周師太公望好服飲水後師計然為越大夫嘗謂人事必與天地相參然後可以成功既佐勾踐破吳乃嘆曰計然之策十用其五而得意既以施國吾欲施之家乃乘扁舟浮五湖變姓名適齊為鴟夷子皮更後百餘年見於陶為朱君財纍億萬號陶朱公振散貧友昆弟復之蘭陵賣藥後人世世識見之云鬼谷子周時隱者居鬼谷因以自號無鄉黨族姓名字所著書蓋出於戰國諸人之表易老陰符所不能該者而鬼谷盡得而泄之其亦一代之雄乎其言有曰世無常責士無常師又曰人動我靜人言我聽知性則寡纍知命則不憂凡此之類其為辭亦卓然矣至若盛神養志諸篇所謂中稽道德之祖散入神明之賾者不亦幾乎郭璞遊仙詩云青溪千餘仞中有一道士借問此為誰云是鬼谷子可謂慨想其人矣徐廣曰潁川陽城有鬼谷注其書者皇甫謐陶隱居尹知章知章唐人鶡冠子楚人當春秋戰國時隱居衣弊履穿以鶡為冠莫測其名氏著書言道家事蓋其學出於黃老然其經營馳騁天下之志未始一日忘亦足窺其萬一其書有曰小人事其君務蔽其明塞其聰乘其威以灼熱天下天高而難追有福不可請有禍不可違其言若此是蓋未能忘情於斯世者至曰鳳鳥陽之精麒麟陰之精萬民者德之精鳴呼亦神矣賈誼作鵬賦多竊其語云道品秦郭四朝燕國人兄弟四人並得道四朝是長兄居華陽雷平山於其處種五果又此地可種奈所謂福鄉之奈以除災厲舍前有塘乃四朝所造也四朝嘗乘小船遊戲其中每叩舷而歌曰清池帶靈岫長林鬱青蔥玄鳥翔幽野晤言出從容鼓枻乘神波稽首希晨風未獲解脫期逍遙立林中其一浪神九垓外研道遂金真戢此靈鳳羽藏我華龍鱗高舉方寸物萬吹皆垢塵顧哀朝生蟪孰盡汝車輪其二遊空落飛飈靈步無形方圓景焕明霞九鳳唱朝陽暉翮扇天津奄靄慶雲翔遂造太微宇挹此金黎漿逍遙玄垓表不存亦不亡其三駕欻舞神霄披霞帶九日高皇齊龍輪遂造北華室神虎洞瓊林風雲合成一開闢幽冥户靈變玄滅迹其四得道後上補九宫左仙公領玉臺執蓋郎宋宣和勑書曰三氣隱靈固匪名言之測萬神凝化莫容擬議之求凡褒序於上真實恢張於至道玉臺侍郎郭真人功參十極位列九宫含景玉璫已飛行於太極扶華晨蓋爰總侍於虛皇方丕闡於元綱宜郅隆於顯號尚期沖格永祐昌圖可特封太微葆光真人薑叔茂秦時封巴陵侯隱於句曲山種五果并五辛菜貨之以市丹砂而用之今山間猶有韭薤即其遺種耶得仙後嘗作書與太極官僚云昔學道於鬼谷得道於少室養翮於華陽待舉於逸域時乘飈車宴吁句曲悟言永嘆代謝之速物存人亡我勞如何道權西漢張良字子房其先韓人也秦滅韓良以家財求客刺秦王為韓報仇以五世相韓故良常學禮淮陽東見滄海君得力士為鐵槌百二十斤秦王東遊至博浪沙中良與客狙擊秦王誤中副車秦王怒求賊急甚良乃更姓名亡匿下邳良嘗從容下邳圯上有一老父衣褐至良所直墮其履圯下顧謂良曰孺子下取履良愕然欲驅之為其老乃疆忍下取履因跪進父以足受之曰孺子可教矣後五日平明與我期此良因怪跪曰諾五日平明良往父先在怒曰後何也五日雞鳴往父又先在復怒曰後何也後五日夜半往有頃父亦來喜曰當如是出一篇書曰讀是則為王者師後十年興十三年孺子見我濟北穀城山下黃石即我矣遂去不見旦日視其書乃太公兵法良因異之嘗習讀居下邳為任俠以説沛公沛公喜常用其策卒以取天下及從高帝都關中以性多疾即導引不食穀閉門不出歲餘上欲廢太子立戚夫人子趙王如意吕后謀於良因致啇雒山四老人從太子侍酒罷酒竟不易太子者良策招四人之力也良乃稱曰家世相韓及韓滅不愛萬金之資為韓報仇今以三寸舌為帝者師封萬户位列侯此布衣之極於良足矣願棄人間事從赤松子遊乃學道欲輕舉薨諡文成侯良始見邳上老父後十三載從高帝過濟北果得穀城山下黃石取而寶祠之及良死并葬黃石每上冢伏臘祠黃石陳留縣天授觀為奉祠之所宋政和封凌虛真人曹參沛人也秦時為獄掾而蕭何為主吏居縣為豪吏矣高祖為沛公參以中涓從孝惠元年以參為齊丞相參之相齊齊七十城天下初定齊悼惠王富於春秋參盡召長老諸先生問所以安集百姓齊故諸儒以百數言人人殊參未知所定聞膠西有蓋公治黃老言使人厚幣請之蓋公為言治道貴清靜而民自定推此類具言之參於是避正堂舍蓋公焉其治要用黃老術故相齊九年齊國安集大稱賢相已而相國何薨代之舉事無所變更一遵何之約束以寬厚清靜為天下師為相國三年薨諡曰懿侯百姓歌曰蕭何為法講若畫一曹參代之守而勿失載其清靜民以寧一道品司馬季主楚人也卜於長安東市宋忠為中大夫賈誼為博士同日俱出洗沐相從論議誦説先王聖人之道術究遍人情相視而嘆賈誼曰吾聞古之聖人不居朝廷必在上醫之中二人即同輿而之市遊於卜肆中天新雨道少人司馬季主間坐弟子三四人侍方辨天地之道日月之運陰陽吉凶之本二大夫再拜謁季主視其狀貌類有知者即禮之使弟子延之坐坐定季主復理前語忠與誼瞿然而悟正襟危坐曰吾望先生之狀聽先生之辭小子竊觀於世未嘗見也今何居之卑何行之污乎季主捧腹大笑曰觀大夫類有道術者何言之陋而辭之野也今天子所賢者何也所高者誰也今何以卑污長者而君云云無非尊爵祿而賤卜筮之語季主敷暢數百言出入老莊皆深明道德以謂卜筮之有益於人也忠誼忽而自失悵然噤口不能言再拜而辭出市門僅能上車伏軾低頭不能出氣三日宋見賈於殿門外乃相引屏語自嘆曰道高益安勢高益危居赫赫之勢失身且有日矣夫卜而不審不見奪精為人主計而不審身無所處此相去遠矣猶天冠地屨也此老子所謂無名者萬物之始也天地曠曠物之熙熙或安或危莫知居之我與若何足預彼哉彼久而愈安雖曾氏之義未有以異也宋忠後以使凶奴不至而還抵罪賈誼為梁懷王傅王墮馬薨誼不食毒恨而死此務華絶根者也按真誥季主後入委羽山石室受石精金光藏景化形法於西靈子都臨去之際託形枕席為代己之像墓在蜀郡成都盤山之南諸葛武侯昔建碑銘德於季主墓前碑讚末曰玄漠太寂混合陰陽天地交泮萬品滋彰先生理著分别柔剛鬼神以觀六度顯明又季主一男一女俱得道男名法育女名濟華皆在委羽山中季主讀玉經服明丹之華挹扶晨之暉今顔色如二十之女子鬚長三尺黑如墨也東卿君道如此真奇事也道化東方朔字曼倩平原猒次人也久在吳中為書師數十年武帝上書説便宜拜為郎至昭王時時人或謂聖人或謂凡人作深淺顯默之行或忠言或戲語莫知其旨至宣帝初棄郎以避亂世置幘官舍風飄之而去後見於會稽賣藥五湖知者疑其歲星精也夏侯湛贊其像曰開濟明豁包含弘大凌轢卿相嘲哂豪傑籠罩靡前跆籍貴勢出不休顯賤不憂戚戲萬乘若僚友視儔列如草芥雄節邁倫高氣蓋世可謂拔乎其萃遊方之外者也楊雄亦以為朔恢達多端不名一行應諧似優不窮似智正諫似直穢德似狂非夷齊而是柳下惠戒其子以上容首陽為拙柱下為工飽食安步以仕易農依隱玩世詭時不逢其滑稽之雄乎顔魯公有畫贊碑陰記並在德州道儒司馬談其先周室之太史也談為太史公學天官於唐都受易於楊何習道論於黃子仕於建元元封之間愍學者不達其意而師悖乃論六家之要指曰易大傳曰天下一致而百慮同歸而殊塗夫陰陽儒墨名法道德此務為治者也直所從言之異路有省不省耳切觀陰陽之術大詳而衆忌諱使人拘而多畏然其敘四時之大順不可失也儒者博而寡要勞而少功是以其事難盡從然其敘君臣父子之禮列夫婦長幼之别不可易也墨者儉而難遵是以其事不可偏循然其強本節用不可廢也法者嚴而少恩然其正君臣上下之分不可改也名家使人儉而善失真然其正名實不可不察也道家無為又曰無不為其實易行其辭難知其術以虛無為本以因循為用無成勢無常形故能究萬物之情不為物先不為物後故能為萬物主有法無法因時為業有度無度因物興舍故曰聖人不朽時變是守虛者道之常也因者君之綱也群臣並至使各自明也其實中其聲者謂之端實不中其聲者謂之欸欸言不聽姦乃不生賢不肖自分白黑乃形在所欲用耳何事不成乃合大道混混冥冥光曜天下復反無名凡人所生者神也所託者形也神大用則竭形太勞則敝形神離則死死者不可復生離者不可復合故聖人重之由此觀之神者生之本形者生之具不先定其神形而曰我有以治天下何由哉子遷世其家著其語云道化梅福字子真九江壽春人少學長安明尚書穀梁春秋為郡文學補南昌尉成帝時委任大將軍王鳳王氏專勢擅朝數見災異群下莫敢正言福三上書劇言秦漢所以得失陳十月之歌備亡逸之戒刺后族太盛其辭懇切而上不見納成帝久亡繼嗣福以為宜建三統封孔子之世以為殷後復上書推迹故文以左氏穀梁禮記相明宜以孔子世為湯後遂下詔封孔子世為殷紹嘉公是時福居家常讀書養性為事元始中王莽顓政一朝棄妻子去九江至今傳以為仙其後有人見福於會稽者變姓名為吳市門卒云洪州豐城縣大江北岸有祠號升仙觀宋紹興封壽春吏隱真人道儒班嗣與從弟彪共學家有賜書內足於財好古之士自遠方至父黨楊子雲以下莫不造門嗣雖修儒學然貴老嚴之術桓談欲借其書嗣報曰若夫嚴子者絶聖棄智修生保真清虛淡泊歸之自然獨師友造化而不為世俗所役者也漁釣於一壑則萬物不姦其志栖遲於一丘則天下不易其樂不絓聖人之網不嗅驕君之餌莫然肆志談者不得而名焉故可貴也今吾子已貫仁義之羈絆繫聲名之韁鎖伏周孔之軌躅馳顔閔之極摯既繫攣於世教矣何用大道為自眩曜昔有學步於邯鄲者曾未得其倣佛又復失其故步遂匍匐而歸耳恐似此類故不進嗣之行已持論如此莊避漢諱故時稱嚴子道術嚴遵字君平蜀人也雅性淡泊學業加妙專精大易耽於老莊常卜筮於成都市以為卜筮者賤業而可以惠衆人有邪惡非正之問則依著龜為言利害與人子言依於孝與人弟言依於順與人臣言依於忠各因勢導之以善從吾言者已過半矣裁日閲數人得百錢足以自養則閉肆垂簾而㖟老子博覽無不通依老子莊周之旨著書十餘萬言楊雄少時從遊學得君平之道為多蜀有富人羅沖者問君平曰君何以不仕君平曰無以自發沖為君平具車馬衣糧君平曰吾病耳非不足也我有餘而子不足奈何以不足奉有餘沖曰吾有萬金子無儋石乃云有餘不亦繆乎君平曰不然吾前宿子家人定而役役未息晝夜汲汲未嘗有足今我以卜為業不下床而錢自至猶有數百塵埃厚寸不知所用此非我有餘而子不足耶沖大慙君平嘆曰益我貨者損我神生我名者殺我身竟不仕年九十餘遂以業終蜀人敬愛至今稱焉有祠在漢州綿竹縣宋紹興封君平為妙通真人本姓莊氏東漢章和之間班固作漢書避明帝諱更之為嚴莊嚴亦古今之通語故老莊亦稱老嚴云谷神子曰君平生西漢中葉王莽篡位遂隱遁惕和蓋上世之真人也玄品録卷之一
