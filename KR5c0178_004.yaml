body:
  text: 句曲外史吴郡海昌張天雨集南史道品周子良字元和茅山陶隱居之弟子也本豫州汝南縣人寓居丹陽建康西鄉清化里祖文朗宋江夏王國左常侍所生父耀宗文朗第五子郡五官掾早卒繼父耀旭揚州議曹從事母永嘉徐淨光懷娠五月夢室中仙聖皆起行四面來遶己身以建武四年丁且歲正月二日人定時生十歲隨母還永嘉天鑒七年隱居東遊海嶽度嶠至永嘉憩于天師治堂而子良始已寄治内住時年十二因求入山服節爲弟子始受仙靈籙老子五千文西嶽公禁虎豹符便專心於香燈之務凡好書畫人間雜伎經心則能後隨往南霍及反木溜十一年從還茅嶺進受五嶽圖三皇内文十二年秋其家中表親族來投山居乃出就西阿别解住子良密受靈㫖降眞接仙而隱居未嘗有疑蓋自十四年乙未歲五月二十三夏至日忽爾寢卧彌綸良乆乃起是爲感降之始其年十月二十七日日昳後平卧尸解時年二十隱居料理篋藴而永無遺記十一月甲子旦因往燕口洞果得一大函書遂登崎嶽鈎取拜請將還即是從來受㫖所封函中皆散紙雜糅乃依日月次第類爲周氏冥通記四卷隱居又撰周玄人傳於記前進之武皇帝子良蓋三生學道初生周達家次生劉偉家其學道精勤之福方流今身已經三過上仙籍其中或犯非法而復落去故經生死乃遂始得保命府改名太玄字虚靈爲保籍丞後更奏東華爲保晨司而刻名紫玉之簡者矣衆眞降教玄㫖具于本記中也道術孫文韜一名韜字文藏會稽剡縣人入茅山師隱居參受眞法及見楊許三眞手書上經稍學模寫遂大巧妙後學大王書殊有深分當時稱之華陽南洞九錫文碑許長史舊館壇碑並韜之跡也南洞碑陰云文韜心柔容毅跡方智圓既業不群物故異簡刊焉所謂異簡之刊山中絶考矣道儒馬樞字要理扶風郿人也博極經史尤精周易老子義邵陵王綸爲南徐州刺史引爲學士遇侯景之亂綸舉兵援臺留書二萬卷付樞樞肆志尋覽殆徧乃喟然嘆曰吾聞貴爵位者以巢由爲桎梏愛山林者以伊吕爲筦庫束名實則蒭芥柱下之高翫清虚則粃糠席上之說稽之篤論亦各從其好也比求志之士望途而息豈天之不惠高尚何山林之無聞甚乎乃隱於茅山有終焉之志樞少屬離亂凡所居處盜賊不入依託者常數百家陳元嘉元年文帝徵爲度支尚書辭不應命晚年目精洞黄能視闇中物有白燕一雙巢其庭樹馴狎闌廡時至几案春來秋去幾三十年大業十三年卒撰道覺論行于世道品薛彪之晋陵人少不狎俗無羡榮秩齊建武二年停東川採訪眞祕三年乃反啓勅於句曲大茅東嶺洞天館行道松餐磵飲彌歷年歲也館即晋眞人任敦成道之所壇竈猶存殊有靈驗先生是以訪古求眞而即地焉隋道術徐則東海剡人也幼沉靜寡欲受業於周弘正善三玄精於論議聲擅都邑則嘆曰名者實之賔吾其爲賔乎遂懷栖隱之操杖策入縉雲山從學者數百人陳太建中應召來憩至眞觀期月辭入天台山因絶粒養性所資惟松术而已雖隆冬沍寒不衣綿絮初在縉雲山太極眞人徐君降而謂之曰汝年出八十當爲王者師然後得道也時晋王廣鎭揚州聞其名手書召之則謂門人曰吾今年八十有一王來召我徐君之言信而有徵矣遂詣王王請受道法則辭以時日不便其後夕中命侍者取香火如平常朝禮之儀至五更而死肢體柔弱如生停留數旬顔色無變王遣使送還天台藏之時自江都至于天台在道人多見則徒步云得放還至其舊居取經書道具分遺弟子仍令淨掃一房曰有客至宜延之於此然後跨石梁而去不知所之須臾柩至方知其靈化時年八十二王聞而益異之遣畫工圖其像柳𧦬爲之贊云張羡初仕後周爲司成中大夫撰老子莊子議凡五十二篇名曰道言唐道品王遠知瑯瑘人祖景賢梁江州刺史父曇選陳揚州刺史母駕部郞中丁超女也嘗晝寢夢靈鳳集其身因而有娠又聞腹中啼聲沙門實誌謂曇選日生子當爲神仙宗伯遠知生於梁大通二年少聰敏博綜群書初師宗道先生臧矜後入茅山嗣修陶隱居經法陳主聞其名召入重陽殿令講論甚見嗟賞及隋煬帝爲晋王鎭揚州使王子相柳顧言相次召之遠知乃來謁見斯須而鬚髮變白王懼而遣之頃復其舊煬帝幸涿郡員外郞崔鳳舉就邀之見於臨朔宫帝躬執弟子禮勅都城起玉清玄壇以處之及幸揚州諫不宜遠去京國帝不能從唐高祖之龍潜也遠知嘗密傳符命武德中太宗平王世充與房玄齡微服以謁之迎謂曰此中有聖人得非秦王乎太宗因以實告遠知曰方作太平天子願自愛太宗登極將加重位固請歸山貞觀九年勅潤州於茅山置太平觀並度道士降璽書曰先生操履夷簡德業冲粹屏棄塵雜栖志玄虚吐故納新食芝餌术念衆妙於三清之表返華髮於百齡之外道邁前烈聲高自古非夫得祕訣於金壇受幽文於玉笈者孰能與於此乎朕昔在藩朝早獲問道眷言夙範無忘寤寐近覽來奏請歸舊山已有别勅不遺高志並許置觀用表夙心未知先生早晚以届江外所營棟宇何當就功佇聞委曲副兹引領近已令太史令薛頤等往詣令宣朕意其年八月十四日謂弟子潘師正曰吾見仙格以吾小時誤傷一童子吻不得自白日昇天見署少室伯將行在即至十六日沐浴加冠衣焚香而寢顧問侍者曰日時早晚對曰辰時曰好即整冠而化年一百二十六歲調露二年贈太中大夫謚曰昇眞先生則天嗣聖加贈金紫光禄大夫天授二年改謚曰昇玄先生時稱王法主云道言徐洪客泰山道士也隋亂貽李密書曰大衆乆聚恐米盡人散師老厭戰難以成功宜乗進取之機因士馬之鋭沿流東指直向江都執取獨夫號令天下密壯其言以書招之洪客竟不岀莫知所之致堂胡君曰洪客之謀奇而正非惟李密不及唐諸人皆不及也天下未嘗無才或隱屠販寄於盜賊洪客魏徵優遊黄冠中而抱匡時之略懷濟世之具而人不知也隋煬無道民怨可也軍叛可也士大夫去之可也爲道士栖身煙霞脱跡塵垢人君得失天下理亂何預己事而慷慨發言深達要領勸人决策直取獨夫詩云人之秉彝好是懿德其此之謂矣然李密不足與言洪客無乃未知晋陽興師或無路自達聊於蒲城公發之耶以此一言觀其人胸中之奇固多矣而迄不自見雖太宗得天下亦寂無所傳聞豈已死歟抑如黄石公魯仲連之流歟嗚呼可謂高士矣道權魏徵字玄成魏州曲城人少孤落魄棄貲産不營有大志隋亂隱爲道士後佐太宗以直諫勸行仁義致貞觀太平爲一代宗臣唐書本傳不備録道術薛頤河東汾陰人少好玄言大業中去俗爲道士解天文律曆煬帝時引入玉清觀内道場亟令章醮武德初遣直秦府頤嘗密謂秦王曰德星守秦分王當有天下願王自惜也累遷至太史令貞觀中將封禪泰山有彗星見頤因言考諸玄象恐未可東封會褚遂良亦言其事於是乃止頤後上表請復爲道士太宗爲置紫府觀於九𡕰山拜頤中大夫行紫府觀主事又勅於觀中建一清臺候玄象有灾祥薄蝕謫見等事隨狀上聞前後所奏與京臺李淳風多相符契淳風在隋亦嘗爲道士號黄冠子以論撰自見云道隱王績字無功絳州龍門人性簡放不喜拜揖兄通隋末大儒也績累應孝悌廉潔舉授祕書正字不樂求爲六合丞以嗜酒不任事時天下大亂遂解去嘆曰網羅在天吾且安之乃還鄉里有田十六頃在河渚間有隱士仲長子光者服食養性績慕其眞素徙與相近子光瘖未嘗交語嘗與對酌悠然歡甚績有奴婢數人種黍春秋釀酒養鳧鴈蒔藥草自供以周易老子莊子置床頭他書罕讀也欲見兄輒渡河還家愛遊北山東皋因號東皋子乗牛經酒肆或留數日武德初以前官待詔門下省故事官給酒日三升或問待詔何樂耶答曰良醖可戀耳貞觀十八年卒道品葉法善栝蒼人也自曾祖三代爲道士皆傳卜筮攝養之術少受符籙能厭劾鬼神顯慶中高宗聞其名徵詣京師將加爵位固辭之留内道場供待特異高宗時廣徵方士合鍊黄白法善上言金丹難就徒費財物有虧政理請柬其眞僞帝然其言因令法善試之出者九十餘人遂一切罷之法善自高宗則天中宗歷五十年常往來名山數召入禁中盡禮問道睿宗即位稱其有冥助之功先天二年拜鴻臚卿封越國公仍依舊爲道士止於京師之景隆觀贈其父慧明銀青光禄大夫歙州刺史李邕撰碑當時尊寵莫與爲比法善生於隋大業之丙子卒於開元之庚子凡百七歲八年詔曰故道士鴻臚卿員外置越國公葉法善天眞精密妙理玄暢包括祕要發揮靈奇固以冥默難源希夷罔測而情栖蓬閬跡混朝伍保黄冠而不杖加紫綬而非榮卓爾孤秀泠然獨往勝氣絶欲貞風無塵金骨外聳珠光内耀斯乃體應中仙名昇上德朕嘗聽政之暇屢詢至道公以理國之法數陳昌言謀參隱諷事宣弘益嘆徽音之未泯悲形解之俄留曾莫整遺殲良奄及水惟平昔感愴于懷宜申禮命式旌泉壤可贈越州都督道品孫思邈京兆華原人也七歲就學日誦千餘言弱冠善談莊老及百家之說洛州總管獨孤信見而嘆曰此聖童也但恨其器大適小難爲用耳周宣帝時以王室多故隱居太白山隋文帝輔政徵爲國子博士稱疾不起嘗謂所親曰過五十年當有聖人出吾方助之以濟人及太宗即位召詣京師嗟其容色甚少謂曰故知有道者誠可尊重羡門廣成豈虚言哉將加以爵位固辭不受顯慶四年高宗拜諫議大夫又固辭上元元年辭疾請歸特賜良馬及鄱陽公主邑司以居焉當時知名之士宗令文孟詵盧照鄰等執師資之禮以事焉思邈嘗從幸九成宫照鄰留在其宅時庭前有病黎樹照鄰爲之賦其叙曰癸酉歲余卧疾長安光德坊之官舍父老云是鄱陽公主邑司昔公主未嫁而卒故其邑廢時有孫思邈處士居之孫君道合古今學殫數術高談正一則古之蒙莊子深入不二則今之維摩詰耳其推步甲乙度量乾坤則洛下閎安期先生之儔也照鄰有未疾醫所不能愈乃問其道何如思邈曰吾聞善言天者必質之於人善言人者亦本之於天天有四時五行寒暑迭代其轉運也和而爲雨怒而爲風凝而爲霜雪張而爲虹霓此天地之常數也人有四肢五臟一覺一寐呼吸吐納精氣往來流而爲榮衛彰而爲氣色發而爲音聲此人之常數也陽用其形陰用其精天人之所同也及其失也蒸則生熱否則生寒結而爲瘤贅陷而爲癰疽奔而爲喘乏竭而爲焦枯診發乎面變動乎形推此以及天地亦如之故五緯盈縮星辰錯行日月薄蝕孛彗飛流此天地之危診也寒暑不時天地之蒸否也石立土踊天地之瘤贅也山崩土陷天地之癰疽也奔風暴雨天地之喘乏也川瀆涸竭天地之焦枯也良醫導之以藥石救之以鍼劑聖人和之以至德輔之以人事故形體有可愈之疾天地有可弭之灾又曰膽欲大而心欲小智欲圓而行欲方詩曰如臨深淵如履薄冰謂小心也𡱝𡱝武夫公侯干城謂大膽也不爲利回不爲義疚行之方也見幾而作不俟終日智之圓也復問養性之要答曰天有盈虚人有迍危不自愼不能濟也故養性必先知自愼也愼以畏爲本故士無畏則簡仁義農無畏則墮稼穡工無畏則慢規矩商無畏則貨不殖子無畏則忘孝父無畏則廢慈臣無畏則勳不立君無畏則亂不治是以太上畏道其次畏天其次畏物其次畏人其次畏身憂於身者不拘於人畏於己者不制於彼愼於小者不懼於大戒於近者不侮於遠如此則人事畢矣思邈自云開皇辛酉歲生至今年九十三矣詢之鄉里咸云數百歲人話周齊問事歷歷如見以此參之不啻百歲人矣然又視聽不衰神采甚茂可謂古之聰明博達不死者也魏徵等受詔修齊梁周陳隋五代史恐有遺漏屢訪之思邈口以傳㖟有如目睹太子詹事盧齊卿童幼時請問人倫之事思邈曰汝後五十年位登方伯吾孫當爲屬使可自保也後齊卿爲徐州刺史思邈孫溥果爲徐州蕭縣丞蓋初謂齊卿之時溥尚未生而預知其事凡諸異跡多類此永淳九年卒遺令薄葬不藏冥器祭祀無牲牢經月餘顔貌不改舉尸就木猶若空衣時人異之註老子莊子撰千金方三十卷攝生眞録枕中素書三教會各一卷並行于代道術周隱遥字息元居洞庭苞山自云角里先生之後山有其祖用里村言其世數人得道隱遥精修太陰鍊形之術不以晝夜更動息不以寒暑易纖厚不食而甚力雖飲而無漏貞觀中召至長安館於内殿問修息之道對曰臣所修者匹夫之事功不及物帝王一言之利萬方蒙福得道之效速於臣人區區所學非萬乗所宜留意懇求歸山詔遂其所適他日贊皇李德裕聞其有道建寳曆崇元聖祖院爲供養之所院在句曲山華陽南洞前令狐楚有記道隱田遊巖京兆三原人初補太學生後罷歸遊於太白山每遇林泉會意輒留不能去其母及妻子並有方外之志與遊巖俱遊山水二十餘年後入箕山就許由廟東築室而居自稱許由東鄰調露中高宗幸嵩山遣中書侍郞薛元超問勞其母遊巖山衣田冠出拜帝令左右人扶止之謂曰先生養道山中比得佳否遊巖曰臣泉石膏育煙霞痼疾既逢聖代得遂逍遥帝曰朕今得卿何異漢獲四皓乎元超曰漢高欲廢嫡立庶黄綺方來豈如陛下崇重隱淪親問巖穴帝於是甚歡因將遊巖就行宫并家口給傳赴都授崇文館學士令與太子少傅劉仁軌談論帝後將營奉天宫幸嵩山遊巖舊宅先在宫側特令不毁親書題額懸其門曰隱士田遊巖宅道質盧鴻一字顥然本范陽人徙家洛陽少有學業頗工篆籕楷隸隱於嵩山開元初遣使備禮再徵不至五年下詔曰朕以寡薄忝膺大位嘗恨玄風乆替淳化未昇每用翹想遺賢冀聞上皇之訓以卿黄中通理鈎深詣微窮太一之道踐中庸之德確乎高尚足侔古人故比下徵書伫諧善績而每輒託辭拒違不至使朕虛心引領于今數年雖得素履幽人之貞而失考父滋恭之命豈朝廷之故與生殊趣耶將縱欲山林不能反乎禮有大倫君臣之迹不可廢也今城闕密邇不足爲難便勅齎束帛之貺重宣斯㫖想有以翻然易節副朕意焉鴻一赴徵六年至東都謁見不拜宰相遣通事舍人問其故奏曰臣聞老子言禮者忠信之薄不足可依山臣鴻一敢以忠信奉見上别召昇内殿賜之酒食詔曰盧鴻一應辟而至訪之至道有會淳風爰舉逸人用勸天下特授諫議大夫鴻一固辭又制曰昔在帝堯全許由之節緬惟大禹聽伯成之高則知天子有所不臣諸侯有所不友遯之時義大矣哉嵩山隱士盧鴻一抗迹幽遠凝情篆素隱居以求其志行義以達其道雲卧林壑多歷年載傳不云乎舉逸人天下之人歸心焉是乃飛書巖穴備禮徵聘方佇獻替式弘理政而矯然不群確乎難拔靜己以鎭其操洗心以激其流固辭榮寵厚風俗不降其志用保厥躬會稽延陵未可名屈太原王霸終以病歸宜以諫議大夫放還山歲給米百石絹五十疋充其藥物仍令府縣送隱居之所若知朝廷得失具狀以聞將還山又賜隱居之服並及草堂一所恩禮特厚鴻一有草堂圖十志好事者傳寳之道儒白履忠陳留浚儀人也博涉文史嘗隱居于古大梁城人號爲梁丘子景雲中徵拜校書郞尋棄官去開元十七年刑部尚書王志愔表薦履忠隱居讀書貞苦守操有古人之風堪爲入閣侍讀及徵至京師履忠辭以老病詔曰處士前祕書省校書郞白履忠學優緗簡道賁丘園採賾以見其微隱居能達其志故以汲引洙泗物色夷門素風自高玄冕非貴几杖云暮章秩宜加俾承禮命之優式副寵賢之美可朝散大夫履忠尋表請還鄉手詔曰孝悌立身靜退勵俗年過耆耄不雜風塵盛德與聞通班是錫豈惟旌賁山藪實欲奬勸人倫且遊上京徐還故里乃停留數月而歸著三玄精辯論一卷註老子及黄庭内景經有文集十卷道品潘師正字子眞貝丘宗城人少喪母廬於墓側以至孝聞大業中度爲道士師事王法主盡以道家隱訣及符籙授之師正清靜寡欲居於嵩山之逍遥谷積二十餘年唯服青䭀飯松葉飲水而已高宗幸東都因至谷中見其蕭然獨處惟一薛荔繩床將朽惻然問師正山中何所須對曰所須茂松清泉此山中不乏又命作符書辭曰不解符書帝與天后嘆異之而去明日步輦載至行宫與語留連信宿乃還尋勅所司於其所居造崇唐觀嶺上别立精思院以處之復改置奉天宫又勅所司於逍遥谷口特開一門號曰仙遊門又於苑北面置尋眞門皆爲師正立名焉數步輦迎至之時太常奏新造樂曲帝令以祈仙望仙翹仙爲名前後賜詩凡數十首甚見尊禮永淳元年將卒謂弟子曰吾默遯於此乃復過勞世主驚擾靈嶽誠罪人也汝等學道不厭深眇卒時年九十有八帝與天后追思不已贈太中大夫謚體玄先生詔司功王適撰碑文道術劉道合陳州宛丘人初與潘尊師同隱嵩山高宗聞其名令於隱所置太一觀以居焉數召入宫及將封泰山屬乆雨帝命於儀鸞殿作止雨之術俄而霽朗帝大悦即令馳傳先登太山以祈福祐前後賜賚皆散與貧乏高宗嘗命其合還丹丹成而上之咸亨中卒及帝營奉天宫遷道合之殯室弟子開棺將易衣改葬其尸唯空皮而背上開折有似蟬蜕盡失其齒骨衆謂尸解高宗聞之嘆曰劉尊師爲朕合丹乃自服仙去矣其所上者卒無異焉道品司馬子微一名承禎字子微河内温人周晋州刺史瑯瑘公裔孫少好學薄於爲吏遂爲道士事潘師正傳其符籙及辟穀導引服餌之術師正特賞異之謂曰我自陶隱居傳正一之法至汝四葉矣子徵嘗徧遊名山乃止於天台山則天聞其名召至都降手勅贊美之及將還勅麟臺監李嶠餞之於洛橋之東景雲二年睿宗遣其兄承褘就天台山迎之京師入宫中首問陰陽術數之事對曰道德經言爲道日損損之又損至於无爲且心目所知見者每損尚未能已豈復攻乎異端增其智慮哉帝曰理身无爲則清高矣理國无爲如何對曰國猶身也老子曰遊心於澹合氣於漠順物自然而無私焉而天下理易曰聖人者與天地合其德是知天不言而信不爲而成无爲之㫖理國之道也帝嘆息曰廣成之言即斯是也子微固辭還山仍賜寳琴一張及霞文帔而遺之朝中名士贈詩李適爲倡屬和三百餘人題曰白雲記盧藏用因指終南山謂先生曰是中大佳何必天台答曰以余觀之仕宦之捷逕也藏用有慚色蓋其初隱於終南云開元九年玄宗遣使迎入京親受法籙前後賚賜甚厚十年駕還西都子微又請還天台玄宗賦詩贈行十五年復召至都勅於王屋山自選形勝置壇室以居焉子微因上言五嶽洞府各有上清眞人降任其職山川風雨陰陽氣序是所理焉冠冕章服佐從神仙皆有名數更請立齋祠之所以别山林之神玄宗從其言因勅五嶽各置眞君祠一所其像設制度依按道經創意爲之子微工篆隸書玄宗命以三體寫老子經因刊正文句定著五千三百八十言爲眞本而奏上之勅所居爲陽臺觀上自題其額賜絹三百疋以充藥餌之用年八十九卒於王屋其弟子表稱解去之日有雙鶴遶壇及白雲從壇中涌出上連于天而師容色如生玄宗深嘆之乃下制曰司馬子微心依道勝理會玄遠徧遊名山密契仙洞存觀其妙逍遥自得之場歸復其根宴息無何之境固以名登眞格位在靈官林壑未改遐霄已曠言念高烈有愴于懷宜贈徽章用光丹籙可贈銀青光禄大夫謚貞一仍御製碑文韋渠牟作傳道華吴筠字貞節華州華陰縣人少通經善屬文舉進士不第性高潔不奈流俗入嵩山依潘尊師爲道士傳正一之法苦心鑽仰乃盡通其術開元中南遊金陵訪道茅山乆之遊天台觀滄海與有名士相娱樂文辭傳京師玄宗聞其名遣使徵之既至召入大同殿與語甚悦令待詔翰林一日問以道術對曰道術之精無如五千言其諸文辭蔓語徒費紙劄耳又問神仙修鍊之事對曰此野人事當以歲月功行求之非人主所宜問筠每開陳皆名教世務以微言諷天子重之賜號宗元先生天寳中李林甫楊國忠用事綱紀日紊筠堅求還嵩山累表不許乃詔於嶽觀别立道院禄山將亂求還茅山許之既而中原大變江淮多盜乃東遊天台剡中與李白孔巢父爲方外交有文集二十卷權德輿爲序其玄綱三篇神仙可學論等爲達識之士所稱筠之在翰林特承恩寵高力士好佛故嘗短筠於上前乃堅求放外然其辭理宏深文彩焕發每製一篇人爭傳寫雖李白之高放杜甫之雄雅能兼之者其唯筠乎道權李泌字長源本居鬼谷七歲知爲文開元十六年以奇童召對張九齡尤所奬愛呼爲小友及長博學善治易常遊嵩華終南間慕神仙不死術天寳中詣闕獻復黄帝九鼎議帝憶其蚤慧召講老子有法得待詔翰林肅宗即位靈武物色求訪會泌亦自至已謁見陳天下成敗事帝悦將授以官固辭願以客從入議國事出陪輿輦衆指曰黄衣者聖人白衣者山人因賜金紫拜元帥廣平王行軍司馬帝嘗曰卿侍上皇中爲朕師今下判廣平行軍是朕父子資卿道義云崔圓李輔國以泌親信疾之泌畏禍願隱衡山有詔給三品禄賜隱士服爲治室廬山中泌嘗取松樛枝以隱背名曰養和後得如龍形者以獻帝四方爭效之代宗立召至舍蓬萊殿書閣初泌不肉食因賜第詔强食肉德宗在奉天召赴行在授左散騎常侍泌始鑿山開車道至三門以便饟漕以勞進禮部尚書三年同平章事帝嘗從容言盧杞清分敢言然少學不能廣朕以古道人皆指其奸朕初不覺也對曰陛下能覺杞之惡安置建中之禍李揆和蕃顔眞卿使希烈其害舊德多矣又楊炎羅不致死杞擠陷之而相關播懷光立功逼使其叛此欺天也帝曰卿言誠有之然建中亂卿亦知桑道茂語乎乃命當然對曰夫命者已然之言主相造命不當言命言命則不復賞善罰惡矣帝曰朕請不復言命俄加崇文館學士修國史泌請廢正月晦以二月朔爲中和節因賜大臣戚里尺謂之裁度百官進農書以示務本帝悦乃著令與上已九日爲三令節皆賜緍錢燕會四年八月日蝕東壁泌口東壁圖書府大臣當有憂者吾以宰相兼學士當之矣明年果卒泌出入禁中事四帝數爲權倖所嫉嘗以智免且時時儻議能寤人主亦自有建明柳玭稱兩京之復泌謀居多其功乃大於魯連范蠡云道品李含光廣陵江都人本姓弘避則天諱易焉家世業儒父孝威號貞隱先生精黄老之術神龍初含光以清行度爲道士居龍興觀開元十七年從司馬子微於王屋山一見目之曰眞玉清之容也居嵩陽二十餘年司馬仙去玄宗召詣闕與語嘆曰吾見含光知司馬眞人猶然在世一日問及金鼎對曰道德公也輕舉公中之私耳時見其私聖人存教若求生詢欲則似繫風玄宗深感異之召居陽臺觀歲餘稱疾乞歸茅山纂修經法天寳四年十二月命中使齎璽書徵之既至館於禁中每欲咨禀必先齋沐請傳道法辭以疾復求還山乃特勅楊許故宅紫陽觀以居之御製詩餞别禁山中採捕魚獵食葷血者不得入時經誥眞跡已多散逸奉詔搜訪備得寳書進上之復召山人王旻請含光楷書上經十三紙以補闕若曰欲得神仙手筆代代相續耳七年三月十八日玄宗受三洞經籙于大同殿遥禮度師賜號玄靜先生法衣一襲以伸師資之禮大曆四年十一月十四日坐蜕于紫陽别院執簡如生時年八十有七以左玄大夫贈正議大夫顔眞卿柳識撰碑並刻開元手詔二十四通于石道華張志和字子同初名龜齡東陽金華人父遊朝好道通莊列二子書著象罔白馬證諸篇佐其說母留夢楓生腹上産志和年十六擢明經以策干肅宗得待詔翰林授右金吾衛録事參軍後以親喪不復仕居江湖自謂煙波釣徒著玄眞子十二卷因以爲稱又述大易十五篇其卦三百六十有五兄浦陽尉鶴齡恐其遁世不返爲築室會稽東郭茨以生蒭掾棟不施斤斧豹席㯶屩閉門十年浙江東觀察使御史大夫陳少遊往見爲終日留表其居曰玄眞坊巷曰迴軒巷又爲創橋以達其居行者謂之大夫橋遂作告大夫橋文以謝之鳴桹杖拏隨意所適垂釣去餌不在得魚肅宗嘗錫奴婢各一志和配爲夫婦名夫曰魚僮婦曰樵青人問其故魚僮使捧釣收綸蘆中鼓枻樵青使蘇蘭薪桂竹裏煎茶竟陵子陸羽校書郞裴脩問孰爲往來者答曰太虛作室而共居明月爲燈以同照與四海諸公未嘗離别何有往來顔眞卿爲吴興刺史志和來謁眞卿以舴艋既敝請爲更之志和曰儻惠漁舟願爲浮家泛宅沿泝江湖之上往來苕霅之間即野夫之幸矣其詼諧辯捷皆此類也好畫山水酒酣或擊鼓吹笛舞筆飛墨應節而成憲宗圖其漁歌求之不能致爲御史李萼寫圖幛千變萬化觀者愕眙在坐六十餘人各署姓名爵里于其下志和悉以兩言目之潜皆屬對舉席嘆駭然立性孤峻不可得而親疏故顔公作浪跡先生碑云視軒裳如草芥屏嗜慾若泥沙希跡乎道丈夫同符乎古作者李德裕亦稱其隱而有名顯而無事不窮不達嚴光之比云道華賀知章會稽永興人少以文辭知名舉進士用陸象先薦以國子四門博士轉太常博士累遷至禮部侍郞加集賢院學士又充皇太子侍讀十三年玄宗封東嶽召知章講定儀註因奏名昊天上帝君位五方五帝臣位帝號雖殊君臣異位陛下享君位于壇上群臣祀臣位於壇下誠足垂表來葉爲變禮之大者也然禮成於三獻亞終合於一處上曰朕正欲如是故問卿耳於是勅三獻於行事五方帝及諸神座於下壇行事後遷太子賔客銀青光禄大夫兼祕書監知章性放曠善談笑當時賢達皆傾慕之天寳三載因病夢遊帝居乃上疏請爲道士求還鄉里捨本鄉宅爲觀先是表乞永周湖數頃爲放生池詔許之復賜鑑湖剡中曲勅其觀爲千秋觀命其子典設郞曾爲會稽郡司馬以便奉養御製詩贈行並序曰天寳三載太子賔客賀知章鑒於止足抗歸老之疏解組辭榮志期入道朕以其夙存微尚年在遲莫用脩掛冠之事俾遂赤松之遊正月五日將歸稽山遂餞東路乃命六卿庶尹三事大夫供帳青門寵行邁也豈惟崇德尚齒亦將勵俗勸人毋令二疏獨光漢册乃賦詩贈行凡預兹宴皆宜屬和遺榮期入道辭老竟抽簪豈不惜賢達其如高尚心環中得祕要方外散幽襟獨有青門餞群公悵望深皇太子已下咸就餞别因自號四明狂客又稱祕書外監晚尤縱逸遨遊里巷每醉後屬詞文不加點尤善草隸書與吴郡張旭齊名還鄉壽養卒年八十有六肅宗以侍讀之舊乾元元年十一月詔曰故越州千秋觀道士賀知章器識夷澹襟懷和雅神清志逸學富才雄挺會稽之美箭藴崑崗之良玉故飛名仙省侍講龍樓常靜默以養閒因譚諧而諷諫以莫齒辭禄再見欸誠願追老二之蹤竟遂四明之客允叶初志脱落朝衣駕青牛而不還狎白鷗而長往舟壑非昔人琴兩亡惟舊之懷有深追悼宜加縟禮式表哀榮可贈禮部尚書玄品録卷之四
