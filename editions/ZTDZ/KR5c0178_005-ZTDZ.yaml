front:
  text: 玄品録卷之五當五
  hash: sha256:6d3aeda0b5889742d6e19f90d694a84046b3ef135008fa0ccb56f2da8d6b8792
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0178_SJB_005-180132b, image: sjb/18/180132b.png}
body:
  text: 句曲外史吴郡海昌張天雨集唐道華李白字太白山東人少有逸才志氣宏放飄然有超世之心父爲任城尉因家焉白有知鑒客并州識汾陽王郭子儀於行伍間稱爲人傑而志尚道術謂神仙可致不讀非聖之書恥爲鄭衛之作故其言多似天仙之辭李陽冰所謂三代以來風騷之後驅馳屈宋鞭撻揚馬千載獨步唯公一人少與魯中儒孔巢父韓準裴政張叔明陶沔等隱於徂徠山酣歌縱飲時號六逸天寳中客遊會稽與道士吴筠隱於剡中既而玄宗召筠赴京師筠薦之於上遣使召白入見與語以七寳床賜食與筠俱待詔翰林白既嗜酒玄宗欲製新樂府亟召白已醉卧酒肆召入以水灑面即令秉筆頃成清平調詞三章帝嘉之嘗醉殿上引足令高力士脱鞾由是被讒放去乃浪跡江湖終日沉飲時侍御史崔宗之謫金陵與白詩酒倡和嘗月夜乗舟自采石達金陵白衣宫錦袍於舟中顧瞻嘯傲傍若無人初賀知章見白賞之曰此天上謫仙人也天台司馬子微亦謂白有仙風道骨可與神遊八極之表後因從祖陳留採訪大使彦允請北海高天師授道籙于齊州紫極宫製青綺冠帔一副將東歸蓬萊仍羽人駕丹丘耳世以爲太白之精一號上清鑒逸眞人道術孟詵汝州梁人也舉進士垂拱初累遷鳳閣舍人詵好方術睿宗在藩召充侍讀長安中爲同州刺史加銀青光禄大夫神龍初歸伊陽之山第以藥餌爲事詵年雖晚莫志力加壯嘗謂所親曰若能保身養性者常須善言莫辭口良藥莫離手睿宗即位召赴京師將加大用固辭衰老景雲中優詔賜物百段勅令每春秋二時給羊酒糜粥開元初河南尹畢構以詵有古人之風改其所居爲子平里卒年九十三撰家祭禮各一卷并補養方三卷張果不知何許人也嘗著陰符經玄解盡其玄理後授銀青光禄大夫號通玄先生道默朱桃椎益州成都人澹泊絶俗被裘人莫能測其所爲長史竇軌見之遺以衣服鹿幘麂鞾逼署鄉正委之地不肯服更結廬山中緝木葉自蔽贈遺一無所受嘗織芒屨置道上見者曰此朱居士屩也爲鬻求茗易之置其處輒取去終不與人接其爲屩草柔細環促結密人爭躡之高士廉爲長史脩禮迎致之降階與之語不答瞪視而出士廉再拜曰祭酒其使臣以無事治蜀耶乃簡條目薄賦歛州大治屢遺人存問見輒走林草自匿云道術王希夷徐州滕縣人也孤貧好道父母終爲人牧羊收傭以供葬葬畢隱於嵩山師道士黄頤向四十年盡傅其閉氣導養之術頤卒更居兖州祖徠山中與道士劉玄博爲棲遁之友好易及老子嘗餌松柏葉及雜花散景龍中七十餘歲氣力益壯刺史盧齊卿就謁致禮因訪以治人之術希夷曰孔子稱己所不欲勿施於人可以終身行之矣及玄宗東巡勅州縣以禮徵至駕前年已九十六上令中書令張說訪以道義宦官扶入宫中與語甚悦開元十四年下制曰徐州處士王希夷絶學棄智抱一居貞乆謝囂塵獨往林壑朕爲封巒展禮側席旌賢賁然來思克應嘉召雖迂綺季之跡已過伏生之年宜命秩以尊儒俾仝高於尚齒可朝散大夫守國子博士聽致仕還山州縣春秋致束帛酒肉仍賜衣一副絹百疋道默武攸緒則天后兄惟良子也恬澹寡欲好易莊周書少變姓名賣卜長安市得錢輒委去后革命封安平郡王固辭願隱居后疑其詐許之以觀所爲攸緒廬巖下如素遁者后遣其兄攸宜敦喻卒不起后乃異之盤桓龍門少室間冬蔽茅椒夏居石室所賜金銀鐺高野服王公所遺鹿裘素幛癭桮諸物塵皆流積不御也暮年肌肉消眚瞳有紫光晝能見星開元十一年無疾卒攸緒當諸武赫焰未嘗輒出卒不蹈其禍云道隱秦系字公緒越州會稽人天寳避亂剡中後客泉州南安有九日山大松百餘章相傳東晋時所植系結廬其下穴石爲研注老子彌年不出刺史薛播數往見之歲時致羊酒而系未嘗至城門其後東度秣陵隱於茅山年八十餘卒南安人思之爲立亭號其山爲高士峯云道品張藴字藏眞晋陽人所居洪州山中因號洪崖子身長七尺五寸鬚眉秀異工琴書善長嘯開元中明皇召見于湛露殿授太常卿累加至司徒辭曰陛下何惜一丘一壑不令臣追跡巢由還山服氣絶粒好畜古物嘗乗雪精騾侍者五人橘栗葛柮术常所服者垂雲笠六角扇方木鐙葛木如意魏惠壺諸物朱衣席帽出入人間望之眞神人焉所著書有老子周易三禮穀梁註河東記三十卷大周
