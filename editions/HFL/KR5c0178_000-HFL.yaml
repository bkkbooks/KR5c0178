body:
  text: 玄品録序當一太史公曰道家使人精神專一動合無形澹足萬物其爲術也因陰陽之大順采儒墨之善撮名法之要與時遷徙應物變化立俗施事無所不宜指約而易操事少而功多予嘗感激以爲豈無其人隱約而不可見使太史之論不得信於後世乃發憤求之於古人由老子而下若老子徒者采其道德文藝而類次之蓋彷彿得其人矣昔南華之叙天下道術尊孔子而不與今倣其意於是集老子不與尊之至也楊子雲曰孔子文足者也老子玄足者也因命題曰玄史寔道家之權輿博大眞人之軌轍興世立教之法則也太史公之論定雨願學焉乙亥歲秋九月十四日句曲外史張天雨序
