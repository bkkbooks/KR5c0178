front:
  text: 玄品録卷之二當二
  hash: sha256:d4b74ddfecaa6b193faf8e4693d3027539d6e0743d52d4663a3d77ea2167bd67
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0178_HFL_002-001a, image: hfl/0558/0558-046.png}
body:
  text: 句曲外史吳郡海昌張天雨集道隱西漢鄭朴字子真隱居谷口玄靜守道履至德之行與君平皆修身自保非其服弗服非其食弗食成帝時大將軍王鳳以禮聘之竟不詘而終楊子法言稱其耕於巖石之下不詘其志而名震京師云漢中有祠道儒楊雄字子雲蜀郡成都人少貧好道博覽無所不見默而好深湛之思清淨無為少嗜欲不汲汲於富貴不寂寂於貧賤不修廉隅以徼名當世自有大度非聖哲之書不好也非其意雖富貴不事也作太玄法言等書皆極天人之指歸為漢名儒蓋其學本於老氏賾其書可見也如唯寂唯寞守德之宅爰清爰靜遊神之廷太玄中藏心于淵美厥靈根測曰藏心于淵神不外也皆入老氏之室者道品三茅君大君諱盈字叔申中君諱固字季偉小君諱衷字思和咸陽南關人也大君生于景帝中元五年丙申歲二弟於戊戌庚子歲生大君年十八棄家辭親入恆山中讀道德經周易傳精思求道復造西城感遇總真王君使主衣書圖籙遂得道為總真弟子還家時年四十九能起死回生父母心異之事父母至終喪停家凡五十三年中君景帝時察孝廉元朔元年舉賢良拜五官郎政和二年轉太子太傅元鳳元年拜破胡校尉武威太守小君少以節行著名隱華陰山武帝建元三年舉方正不就徙梁國為孝王上賔宣帝地節二年遷洛陽令轉西城校尉上郡太守元帝即位拜五更大夫轉西河太守中君時為執金吾並當之官鄉里祖送者數百人大君對賔曰吾雖不作二千石卿相亦當有神靈之職天帝見選補東嶽上卿霍林司命君領拔學道總吳越生死之籍此亦上真宗師神官之要位也來年四月三日當升舉諸君能來顧如今日否若見省者亦不須有所損費自當有以相供待也至期果有迎官來下乃與宗族辭决民謂鄉里子弟曰我今此去權停江水之東句曲之山季偉思和雖見事晚必能自悔釋官委祿以來求我言畢謝時人而去蓋元帝初元五年丁丑君年一百二歲矣二弟在官聞兄白日神仙各棄官還家以永光五年壬午三月六日渡江求兄於東山既見悲欣流涕君告二弟曰悟何晚矣遂授以神散靈方濟度俱成真人而治句曲山之洞金壇華陽之天遂號中君為定録神君小君為保命仙君皆天職也大君至哀帝元壽二年庚申年一百四十五以是歲八月十八日己酉受九錫玉册文遷任赤城玉洞之府位為司命上真東嶽上卿太元真人君告二弟曰吾今去便有局任不得數相往來要當一年再過來於此山三月十八日十二月二日期要吾師總真君及南獄太虛赤真人遊盻於二弟之處也將可記識之有好道者待我於是日自當料理之有以相教訓於未悟於是二君留治茅山洞內立宫結搆於外將道著萬物流潤蒼生德加鳥獸各獲其情神驗禍福罪惡必明內法既融外教坦平爾乃風雨以時五禾熟成疾癘不起暴害不行境無灾眚邑無賊兵時父老謳歌曰茅山連金陵江湖據下流三神乘白鵠各治一山頭召雨灌旱稻陸田亦復柔妻子咸保室使我百無憂白鵠翔青天何時復來遊三君往曾各乘白鵠集山之三處時人互有見者是以發於歌詠矣乃復因鵠集之處分句曲之山為大茅君中茅君小茅君三山焉統而言之盡是句曲之一山耳無異名也東漢道品張陵道書諱道陵字輔漢沛國封縣人生於餘杭天目山本太學諸生博採五經晚乃嘆曰此無益於年命遂學黃帝九鼎丹經丹成於繁陽山又得隱書於嵩山石室時值中國紛亂漢致陵遲知文道凋喪不足拯危佐世退隱於餘杭者十年乃與弟子入蜀蜀之百姓翕然奉事以師之專以廉恥慈愍化民不喜用刑罰有疾病者皆令自疏平生罪過與神盟以身死為約故皆改惡從善開鹽泉以利百姓驅逐大蛇戰鬼二十四敗為二十四治為蜀人除害蓋備修制命山嶽衆神之術而功德並著號為天師偏得其道者弟子王長趙升道隱向長字子平河內朝歌人潜隱於家性尚中和好道老易嘗讀易至損益卦喟然嘆曰吾已知富不如貧貴不如賤但未知死何如生耳貧無資好事者更饋焉受之取足而反其餘建武中男女嫁娶既畢敕斷家事肆意遊於五嶽名山竟不知所終道化逄萌字子慶北海都昌人聞王莽殺其子宇謂友人曰三綱絶矣不去禍將及人即解冠絓東都城門將家屬浮海客於遼東萌素陰陽知莽將敗乃首戴瓦盎哭於市曰新乎新乎因遂潜藏及光武即位乃之琅琊勞山養志修道人皆化其德連徵不起以壽終道隱嚴光字子陵會稽餘姚人也少有高名與光武同遊學及光武即位光乃變姓名隱身不見帝思其賢乃令以色物訪之後齊國上言有一男子披羊裘釣澤中帝疑其光乃備安車玄纁遣使聘之三反而後至舍於比軍光卧不起帝即其卧所撫光腹曰咄咄子陵不可相助為理耶光又眠不應良久乃張目熟視曰昔唐虞著德巢父洗耳士故有志何至相迫乎帝曰我竟不能下汝耶於是升輿嘆息而去復引光入論道舊故相對纍日帝從容問光曰朕何如昔時對曰陛下差增於往因共偃卧光以足加帝腹上明日太史奏客星犯帝坐甚急帝笑曰朕故人嚴子陵共卧耳其答司徒侯霸書有曰懷仁輔義天下悅阿腴順㫖要領絶除諫議大夫不屈乃耕於富春山後人名其釣處為嚴陵瀨建武十七年復特徵不至年八十終於家帝傷惜之道隱梁鴻字伯鸞扶風平陵人家貧牧豕於上林苑中曾誤遺火延及他舍鴻悉以豕償之其主猶以為少鴻願以身居作後歸鄉里勢家慕其高節多欲女之鴻並絶不娶同郡孟氏有女狀肥醜而黑力舉石臼擇對不嫁年至三十父母問其故女曰欲得賢如梁伯鸞者鴻聞而聘之女求作布衣麻屨織作筐緝績之具及嫁始以裝飾入門七日而鴻不答妻乃跪床下請曰竊聞夫子高誼簡斥數婦妾亦偃蹇數夫矣今而見擇敢不請罪鴻曰吾欲褐裘之人可與俱隱深山者爾衣綺縞傅粉墨豈鴻所願哉妻曰以觀夫子之志耳妾自有隱居之服乃更為椎髻著布衣摻作而前鴻大喜曰此真梁鴻妻也能奉我矣字之曰德曜共入灞陵山中以耕織為業詠詩書彈琴以自娛仰慕前世高士而為四皓以來二十四人作頌因東出關過京師作五噫之歌曰陡彼北荒兮噫願見帝京兮噫宫室崔嵬兮噫人之劬勞兮噫遼遼未央兮噫顯宗聞而非之求鴻不得乃易姓運期名曜字侯光與妻子居齊魯之間又去適吳依大家臯伯通居廡下為人賃春每歸妻為具食不敢於鴻前仰視舉按齊眉伯通察而異之曰彼傭能使其妻敬之如此非凡人也乃方舍之於家疾且苦告主人曰愼勿令我子持喪歸去及卒伯通等為求葬地於吳要離冢傍咸曰要離烈士伯鸞清高可令相近鴻友人高恢道隱高恢字伯通京兆人好老子隱於華陰山中與梁鴻友善及鴻東遊思恢作詩曰鳥嚶嚶兮友之期念高子兮僕懷思想念恢兮爰集兹二人遂不復相見恢亦高抗終身不仕道品魏伯陽吳人也本高門之子性好道術不肯仕宦閒居養性時人莫知其所從來謂之治民養身而已入山作神丹既成服之死而復生與其弟子姓虞者皆仙去道逢伐木者乃作手書寄謝鄉里人及二弟子伯陽作參同契五行相類凡三卷其說似周易其實假借爻象以論大丹之意而世人者不考丹事多作陰陽釋之殊失其㫖按參同契一書大儒朱元晦蔡元定皆深取其義議論多及之非洞明易老淵㫖者弗能窺也道隱臺佟字孝威魏郡鄴人也隱於武安山鑿穴為居採藥自業刺史行部及使律事致謁佟載病往謝刺史乃執贄見佟曰孝威居身如是甚苦如何佟曰佟幸得保終性命存神養和如明使君奉宣詔書夕惕庶事反不苦耶遂去隱逸終不見道隱韓康字伯休一名恬休京兆灞陵人家世著姓常採藥名山賣於長安市口不二價三十餘年時有女子從康買藥康守價不移女子怒曰公是韓伯休耶乃不二價康嘆曰我本欲避名今小女子皆知有我焉何用藥為乃遁入霸陵山中道默矯愼字仲彥扶風茂陵人也少好黃老隱遁山谷因穴為室仰慕松喬導引之術與馬融蘇章鄉里並時皆推先於愼汝南吳蒼甚重之因遺書以觀其志曰仲彥足下勤處隱約雖乘雲行泥樓宿不同每有西風何嘗不嘆蓋聞黃老之言乘虛入冥藏身遠遁亦有理國養人施於為政至如登山絶跡神不著其證人知睹其驗吾從先生欲其可者於意何如昔伊尹不懷道以待堯舜之君方今明明四海開闢巢許無為箕山夷齊悔入首陽足下審能騎龍弄鳳翔嬉雲間者亦非狐兔燕雀所敢謀也愼不答年七十餘竟不肯娶後忽歸家自言死日及期果卒後人有見愼於敦煌者故前世異之道隱法真字高卿扶風郿人好學而無常家傳通內外圖典為關西大儒弟子自遠方至者數百人性恬靜寡欲不交人間事太守請見之乃幅巾詣謁太守欲以功曹相屈真曰明府見待有禮故敢自同賔末若欲吏之真將在南山之南北山之北矣同郡田弱薦真體兼四業幽居恬泊將蹈老氏之高蹤不為玄纁屈也臣願聖朝就加衮職必能奏清廟之歌致來儀之鳳也帝虛心欲致前後四徵真曰吾既不能遁形遠世豈飲洗耳之水哉遂深自隱絶友人郭正稱之曰法真名可得聞身難得而見逃名而名我隨避名而名我追可謂百世之師者矣乃共刊石頌之號玄德先生道化劉寬字文饒弘農人年七十三一旦遇青谷先生降之寢室㖟其杖解法將去入華山行九息服氣又授以爐火丹方修之道成後來華陽洞中主始學道者寬仕漢位至司徒太尉好行陰德拯寒困萬民悅而附之如父母焉道隱龐公南郡襄陽人居峴山之南未嘗入城府夫妻相敬如賔荆州刺史劉表數延請不能屈乃就候之謂曰夫保全一身孰若保全天下乎龐公笑曰鴻鵠巢於高林之上暮而得所棲黿龜穴於深淵之下夕而得所宿夫取舍行止亦人之巢穴也且各得其所樓宿而已因釋耕於壠上而妻子耘於前表指而問曰先生苦居畎畝而不肯官祿後世何以遺子孫乎龐公曰世人皆遺以危今獨遺之以安雖所遺不同未為無所遺也遂携其妻子登鹿門山因採藥不返道儒廖扶字文起汝南平輿人習韓詩歐陽尚書教授嘗數百人父坐事下獄死扶感父以法喪身憚為吏及服終而嘆曰老子有言名與身孰親吾豈為名乎遂絶志世外專精經典尤明天文推步之術州郡公府辟召皆不應扶知歲荒聚穀數千斛悉用給宗族姻親又斂葬遭疫死亡不能自收者時人號為北郭先生年八十終于家道言樊英字季齊南陽魯陽人也少受業三輔習京氏易兼明五經又善風角算河洛七緯推步灾異隱於壺山之陽州郡前後禮請不應舉賢良方正有道皆不行永建二年順帝策書備禮玄纁徵之復固辭稱疾篤乃詔切責郡縣駕載上道英及京稱病不肯起乃强輿入殿猶不以禮屈帝怒曰朕能生君能殺君能貴君能賤君能富君能貧君君何以慢朕命英曰臣受命於天生盡其命天也死不得其命亦天也陛下焉能生臣焉能殺臣臣見暴君如見仇讎立其朝猶不肯可得而貴乎雖在布衣之列環堵之中晏然自得不易萬乘之尊又可得而賤乎陛下焉能貴臣焉能賤臣非禮之祿雖萬鐘弗受也申其志雖簞瓢不厭也陛下焉能富臣焉能貧臣帝不能屈而敬其名使出就太醫養疾帝令公車令導尚書奉引賜几杖待以師傅之禮朝廷每有灾異詔輒下問變復之效所言多驗年七十餘卒于家道品王遠字方平東海人也舉孝廉除郎中稍加至中散大夫博學五經尤明天文圖讖河洛之術逆知天下盛衰之期九州吉凶觀諸掌握後棄官入山修道道成孝桓帝連徵不出使郡牧逼載以詣京師遠低頭閉口不肯答詔乃題宫門扇版四百餘字皆說方來之事帝惡之使人削之外字始去內字復見墨皆徹版裏方平無復子孫里人纍世相傳共事之同郡故太尉公陳耽為方平駕道室朝夕朝拜之但乞福消灾不從學道方平住耽家四十餘年後與耽云吾期運將盡當去不得復停明日日中當發也至時方平死耽知其化去不敢下著地但悲涕嘆息曰先生捨我去耶我將何如具棺器燒香就床上衣裝之至三日三夜忽失其尸衣帶不解如蛇蛻耳方平去後百餘日耽亦死或謂耽得方平之道化去或謂方平知耽將終委之而去也其後方平欲東之括蒼山過吳住胥門蔡經家經者小民也骨相當仙方平故往其家因語經曰汝生命應得度世然汝少不聞道今氣少肉多當從尸解耳尸解一劇須臾如狗竇中過耳告以要言乃委經去後經果蟬蛻失所在去十餘年忽然還家語其家云七月七日王君當來過到其日可作數百斛飲食以供從官乃去到期日方平果來麾節導從威儀奕奕如大將軍也要麻姑會於經家比舍有陳尉者叩頭乞拜願得驅使比於蔡經方平曰君且起可向日立方平從後視之曰噫君心不正影不端終不可教以仙道也當授君地上主者之職臨去以一符一傳著小箱中與陳尉云可以消灾治鬼陳尉後年一百十歲嘗得方平賜書真書廓落大而不工先是無人知方平名遠者乃因陳尉傳之道化韓崇字長季吳郡毗陵人也少好道林屋仙人王緯作瑋玄曾㖟之以流珠丹一法崇奉而修之大有驗瑋玄語之子行此道亦可以出身仕宦無妨仙舉也崇遂仕稍至宛陵令行仁以為政用道以撫民虎狼深避蝗不集界遷汝南太守拔書佐袁安安後位至司徒時人通以崇有識物之鑒也陰皇后葬京師近郡二千石妻當會園陵而崇獨居清素妻忿崇哭泣詔問其故太常馮夷答曰汝南太守韓崇清苦遠尚味道忘形身享重官而妻自紡績政化仁簡視民如傷深達奇博有君子之鑒斯則昏夕之夜光陛下之子産也妻不通寒儉之節哭怨無衣將足以顯崇明德耳上奇之加崇俸祿秩中二千石後孝明皇帝巡狩汝南上治崇府崇使妻出住孤獨老嫗家上聞之嘆曰韓崇所謂百鍊不銷也賜縑五十匹崇在郡積十四年政化著洽舉天下最年七十四瑋玄乃授以隱解法得去入大霍山復㖟以遁化泥丸紫户術以度世後來華陽洞中為左理中監陶隱居云漢書所傳事跡略同而置辭小異耳道術夏馥字子治陳留人也少好道服术餌和雲母後入吳山從赤鬚先生受鍊魂法在華陽洞中為明晨侍郎馥少時被公車辟召懸辟書著桑樹乃去其用懷高邁如此隱居云後漢及高士傳並言馥陳留圉人桓帝時舉直言不就道化劉翊字子翔漢書作字子相翊本潁川人少好道德而家世大富常能周施而不以為惠恤死救貧非一人矣舉上計掾拜郎中遷陳留太守出長安五百里中斂死恤窮損己分人行達陽平遂遇馬皇先生告翊曰子仁感天地陰德神鬼太上將嘉子之用情矣使我來携汝以長生之道翊叩頭自摶願乞侍給因將入桐柏山中㖟以隱地八術服五星之華法得度名東華入華陽洞中為定録府右理中監三國道儒張臶字子明少遊太學學兼內外并州牧高幹表除樂平令不就徙遁常山門徒且數百人太祖為丞相辟不詣太和中詔求隱學之士郡纍上臶發遣老病不行廣平太守盧育到官三日綱紀白承前致版謁臶育教曰張先生所謂上不事天子下不友諸侯者也豈此版謁所可光飾哉但遺主簿奉書致羊酒之禮卒年一百五歲是歲太守王肅至官教下縣曰前在京都聞張子明來至問之會其已亡致痛惜之此君篤學隱居不與時競以道樂身昔絳縣老人屈在泥塗趙孟升之諸侯用睦愍其耄勤好道不蒙榮寵書到遣吏勞問其家顯題門户務加殊異以慰既往以勸將來道默焦先字孝然河東人也漢末關中亂先失家屬獨竄於河渚間食草飲水無衣履時太陽長朱南望見之謂為亡士欲遣船捕取同郡侯武陽語縣此狂癡人耳遂注其籍給廩日五升人皆輕易之然其行不踐邪徑必循阡陌及其捃拾不取太穗飢不苟食寒不苟衣每出見婦人則隱翳須去乃出自作一瓜牛廬淨掃其中營木為床而草褥其上至天寒時構火以自炙呻吟獨語太和青龍中嘗持一杖南渡河水泛漲輒獨云未可也由是人頗疑不狂所言多驗僉謂之隱者也年八十九終道默石德林安定人也建安十六年關中亂南入漢中初不治産業不畜妻孥常讀老子五千文及諸內書晝夜吟詠不絶口食不足頗行乞乞不取人問其姓名口不肯言時人號之曰寒貧蓋專志玄默者道品左慈字元放廬江人少明五經兼通星緯見漢祚將盡天下亂起乃嘆曰值此衰運官高者危財多者死當世榮華不足貪也乃學道術精思於天柱山中得石室丹經修之能變化萬端曹公召試之欲從學道慈曰學道當得清淨無為非尊貴所宜曹性猜忌屢欲殺之不能也慈在荆州劉表作牧以為惑衆復欲殺慈慈先知委表東去及見吳主孫權權素知慈有道禮重之按真誥慈今在小括山常行來數在此下尋更受職也慈顔色甚少正得爐火九華之益隱居括蒼在建安末慈嘗渡江尋茅山仍得入洞又乞丹砂合九華丹即李仲甫弟子葛玄之師也道品葛玄字孝先從左元放受經法嘗餌术尤長於治病救劾鬼魅之術能分形變化吳大帝要與相見欲加榮位玄不聽求去不得待以客禮一日語弟子張恭言吾為世主所逼留不遑作大藥今當以八月十三日中時去矣至期玄衣冠入室卧而氣絶顔色不變弟子燒香守之三日三夜夜半忽大風起發屋折木聲如雷燭滅良久燃燭失其所在但見委衣床上帶無解者明旦問鄰人鄰人云了無大風風止在一宅內籬落樹木並敗折也按真誥玄初在長山近入蓋竹亦能乘虎使鬼無所不至但幾於未得受職耳隱居注云是抱朴從祖即鄭思遠之師也少入山得仙時人咸莫測所在傳言東海中仙人寄書呼為仙公故抱朴亦同然之道品鮑靚字太玄東海陳留人年五歲語父母云本是曲陽李家兒九歲墮井死其父母尋訪得李氏推問皆符驗靚學兼內外明天文河洛書仕至南陽太守嘗行部入海遇風飢甚取白石煮食之以自濟後遇真人陰君授道訣復師左元放受中部法三皇內文能役使鬼神封山制魔百餘歲卒按真誥靚及妹並是七世祖積行陰德故令福逮靚等今並作地下主者在華陽中隱居云靚用泰清尸解法當是主者之最高品矣靚女鮑姑散騎常侍葛洪之妻也道言張玄賔定襄人也魏武帝時舉茂才歸鄉里師事西河蘇公受服术餌兼行洞房白元之事後遇真人樊子明於少室山㖟以遁變隱景之道昔在天柱山後來華陽內為理禁伯理禁伯者主雨水官也亦保命之監國也玄賔善談空無乃談士常論無者大有之宅小有所以生焉積小有以養小無見大有以本大無有有亦無焉無無亦有焉所以我目都不見物物亦不見無寄有以成無寄無以得無於是無則無宅也太空亦宅無矣我未生時天下皆無無也自云昔曾詣蓬萊左公宋晨生與其論無粗得人意桐柏諸真亦不能折之過此以往尚不能本有安能本無耶其高氣秉理如此道儒王弼字輔嗣山陽高平人少察慧十餘歲便好老莊吏部尚書何晏甚奇之曰若斯人者可與言天人之際矣晏注老子始成詣弼見其所注精奇因以所注為道德二論復條向者勝理謂之曰此僕以為極可得復難否弼便作難一坐便以為屈嘗立論以為天地萬物皆以無為為本無也者開物成務無往不存者也陰陽恃以化生萬物恃以成形賢者恃以成德不肖恃以免身故無爵而貴矣弼又作易傳先儒宗之𣈆道然孫登字公和汲郡人無家屬於郡北山為土穴居之好讀易撫一絃琴性無恚怒人或投諸水中欲觀其怒登既出便大笑嘗住宜陽山有作炭人見之知非常人與語登不應文帝聞之使阮籍往觀既見與語亦不應嵇康從之遊三年問其所圖終不答康將别謂曰先生竟無言乎登乃曰子識火乎生而有光而不用其光果在於用光人生而有才而不用其才果在於用才故用光在乎得薪所以保其耀用才在乎識真所以全其生今子才多識寡難乎免於今之世矣子無求乎康不能用後作幽憤詩云昔慚柳下今愧孫登竟莫知所終道質郭文字文舉河內軹人也少愛山水尚嘉遁每遊山水彌旬忘返父母終服畢不娶辭家遊名山恆著鹿裘葛巾採竹葉木實貿鹽以自供食有餘穀輒恤窮匱王導聞其名遣人迎之既至置之西園溫嶠嘗聞先生安獨無情乎文曰情由憶生不憶故無清嶠又問曰先生獨處窮山若疾病遭命或為烏鳥所食顧不酷乎文曰藏埋者亦為螻蟻所食復何異乎導嘗衆賔共集絲竹並奏試使呼之文瞪眸不轉跨躡華堂如行林野于時坐者咸有鈎深味遠之言文常稱得達來語天機鏗宏莫有窺其門者一旦忽求還山及蘇峻反入皆以為知幾卒葛洪庾闡並為作傳讚頌其德云梁乾化封靈曜真君道質嵇康字叔夜譙國銍人康早孤有奇才遠邁不群身長七尺八寸美辭氣有風儀而土木形骸不白藻飾人以為龍章鳳姿天質自然學無師授博覽無不該通與魏宗室婚拜中散大夫嘗修養性服食之事彈琴詠詩有足於懷以為神仙稟之自然非積學所致至於導養得理則安期彭祖之倫可及乃著養生論每思郢質所與神交者惟陳留阮籍河內山濤豫其流者向秀劉伶籍兄子咸王戎遂為竹林之遊戎自言與康居山陽二十年未嘗見其愠喜康嘗採藥遊山澤會其得意忽焉忘返時有譙蘇遇之謂為神人至汲郡山中見孫登遂從之遊登沉默自守無所言說康臨去乞一言登曰君才則高矣保身之道不足又遇王烈共入山烈嘗得石髓如飴自服半餘與康皆凝為石又於石室中見一卷素書遽呼康往取輒不復見烈乃歎曰叔夜志趣非常而輒不遇命也山濤將去選官舉康自代康乃與濤書告絶略曰聞道士遺言餌术黃精令人久壽意甚信之遊山澤觀魚鳥心甚樂之一行作吏此事便廢安能舍其所樂而從其所懼哉今但欲守陋巷教養子孫時時與親舊叙離闊陳說平生濁酒一杯彈琴一曲志願畢矣此書既行知其不可羇屈也南海太守鮑靚通靈者也東海徐寧師之寧夜聞靚室有琴聲怪其妙而問焉靚曰嵇叔夜寧曰嵇臨命東市何得在兹靚曰叔夜示形有終而實尸解耳見顧凱之嵇康贊阮籍字嗣宗陳留尉氏人容貌環傑志氣宏放慠然獨得任清不羇而喜怒不形於色或閉户視書纍月不出或登山臨水經日忘歸博覽群籍尤好莊老嘗著達莊論叙無為之貴文多不録作詠懷詩八千餘篇為世所重嗜酒能嘯善彈琴當其得意忽忘形骸時人多謂為癡聞步兵厨營人善釀有貯酒三百斛乃求為步兵校尉遺落世事又能為青白眼見禮俗之士以白眼對之嘗於蘇門山中遇孫登與商略終古及栖神導氣之術登皆不應籍因長嘯而退至半嶺間有聲若鸞凰之音響乎巖谷乃登之嘯也歸著大人先生傳其略曰世之所謂君子惟法是修惟禮是克手執圭璧足履繩墨行欲為目前檢言欲為無窮則少稱鄉黨長聞鄰國上欲圖三公下不失九州牧獨不見群蝨之處𥚛中逃乎深縫匿乎壤絮自以為吉宅也行不敢離縫際動不敢出褌襠自以為得繩墨也然炎丘火流焦邑滅都群蝨處於褌中而不能出也君子之處域內何以異夫此亦籍之本趣也每率意獨駕不由徑路車跡所窮輒慟哭而返嘗登廣武觀楚漢戰處嘆曰時無英雄使竪子成名景元四年卒道儒向秀字子期河內懷人清悟有遠識雅好老莊之學少為山濤所知莊周所著內外篇秀於舊注外而為解義妙演奇致大暢玄風唯秋水至樂二篇未竟惠帝之世郭象字子玄者述而廣之秀與嵇康吕安為友趣舍不同康慠世不羇安放逸邁俗而秀雅好讀書秀將注莊子先以告康安咸曰此書詎復須注徒棄人作樂事耳及成以示二子康曰爾故復勝否安乃驚曰莊周不死矣復注周易大義可觀而與漢世諸儒互有彼此未若隱莊之絶倫也康又善煆秀每為之佐相對怡然傍若無人後應本郡計掾入洛文帝問曰聞有箕山之志何以在此秀曰以為巢許狷分之士未達堯心豈足多慕帝甚悅其後鄰人有吹笛者發聲嘹喨追想曩昔嵇生遊宴之好感音而嘆作思舊賦云位至散騎常侍卒道儒皇甫謐字士安幼名靜安定人漢太尉嵩之曾孫也年二十不好學晚就鄉人席坦受書居貧帶經而農遂博綜經籍百家之言沉靜寡欲始有高尚之志以著述為務自號玄宴先生著禮樂聖真之論後得風痺疾猶手不輟卷或勸修名廣交謐作守玄論以答之貧者士之常賤者道之實遂不仕耽玩墳典忘疾與食時人謂之書淫或針其過篤將損耗精神謐曰朝聞道夕死可矣况命之修短分定懸天乎舉孝廉相國辟又舉賢良方正俱不應自表就武帝借書帝送一車書與之雖羸疾而披閲弗怠纍徵竟不仕大康二年卒所著帝王世紀高士逸士烈女等傳並重于世玄品録卷之二
