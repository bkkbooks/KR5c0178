front:
  text: 玄品録卷之三當三
  hash: sha256:de237c7fab7e4700a1e7a0b1c7fb8e645f4d58028c783daba7288965c80db798
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0178_HFL_003-001a, image: hfl/0558/0558-102.png}
body:
  text: 句曲外史吳郡海昌張天雨集道品葛洪字稚川丹陽句容人少好學家貧躬自伐薪以貨紙墨夜輒寫書習誦遂以儒學知名性寡欲無所愛玩不知棋局幾道樗蒲齒名為人木訥不好榮利閉門却掃未嘗交遊時或尋書問義不遠數千里崎嶇冒涉期於必得尤好神仙導養之法從祖玄吳時學道得仙號曰葛仙公以其鍊丹祕術授弟子鄭隱洪就隱學悉得其法焉咸和初司徒王導召補州主簿後選為散騎常侍領大著作皆固辭不就晚欲鍊丹聞交趾出丹砂求為勾漏令帝以洪資高不許洪曰非以為榮以有丹耳帝從之行至廣州刺史鄧嶽留不聽去乃止羅浮山鍊丹在山積年優遊閒養著述不輟其自序曰洪體之進趍之才偶好無為之業假令舊翅則能凌厲霄玄騁足則能追風躡景猶欲戢徑翮於尺鷃之群藏逸迹於跛驢之伍豈况大塊禀我以尋常之短羽造化假我以至駑之蹇足自卜者審不能者上豈敢力蒼蠅而慕冲天之舉策跛鱉而追飛兔之軌哉是以望絶於榮華之塗而志安乎窮圮之域藜藿有八珍之甘蓬蓽有藻棁之樂也世儒徒知服膺周孔莫信神仙之書不但大笑之又將毁謗真正故豫所著抱朴子內外篇凡一百一十六篇雖不足藏之名山且欲緘之金匱以示識者蓋以自號名其書云洪博問學識江左絶倫著述篇章富於班馬又精辨玄賾析理入微一日坐至日中兀然若睡而卒年八十一視其顔色如生體亦柔軟舉入棺甚輕如空衣蓋尸解仙去矣道權王義之字逸少司徒導之從子也善隸書為古今之冠論者謂其筆勢以為飄若遊雲矯若驚龍每自稱我書比鍾繇當抗衡比張芝草猶當鴈行也深為從伯敦導所器重起家祕書郎後為右軍將軍會稽內史羲之推好服食養性不樂在京師初渡浙江便有終焉之志會稽有佳山水名士多居之謝安未仕時亦居焉嘗與同志宴集於山陰蘭亭羲之自為序或以潘嶽金谷詩序方之王羲之比於石崇聞而甚喜性愛鵝山陰有道士養好鵝羲之往觀焉意甚悅因求市之道士云能為寫道德經當舉群相贈耳羲之欣然寫畢籠鵝而歸其任率如此後稱病去郡於父母墓前為文自誓不復出仕既去官與東上人士盡山水遊之又與許先生邁共修服食採藥卒年五十九道品許邁字叔玄一名映丹陽句容人總角好道潜致幽契曾從郭璞筮卦遇大壯之大有上六爻發謂曰君元吉自天宜學輕舉之道初師鮑靚受中部法及三皇內文一旦辭家謂餘杭懸霤山近延陵之茅山是洞庭西門潜通五嶽陳安世茅季偉所嘗遊處於是立精舍於懸霤而往來茅嶺之洞室朔望時節還家定省而父母既終乃遣婦孫氏還家散髮去纍改名玄字遠遊與王右軍父子周旋子猷乃修在三之敬嘗遺羲之書云自山陰南至臨安多有金堂玉室仙人芝草左元放之徒漢末諸得道者皆在焉永和四年秋絶跡於臨安西山又入在臨海赤山遇良友王世龍趙道玄傅太初者遂師世龍授解束之道修反行之法服玉液朝腦精二三年中面有光華還顔反少極為成道於是茅司命勑定録君舉之使奏聞上宫移名東方署為地仙時三官都禁左郎遣典柄侯周魴主非使者嚴白虎來於赤山中即欲執之以去且詰其罪狀出丹簡罪簿各執一通而問映云夫欲學道慕生上隸真人玄心栖邈恭誠高靈者當得世功相及禍惡不遘陰德流根仁心上逮乃可步真索仙度名洞府耳云何父手殺謝弓且亂逆三光又許朝斬李玘之頭以代蔡扶之級又走斬射潘綦等攴解鈴下曹表等水沉湯雲之尸火燒徐昂之骸絞殺桓整刳割振噲酷害虐暴刑濫四十有三張皇寃事在天帝禍戾山積善功無一又汝本屬事帛家之道血食生民逋愆宿責列在三官而越幸網脫奉隸真氣父子一家各事師主同生乖戾不共祭酒罪咎之大陰考方加有如此積罪亦無仙者當可得欺太上之曹使汝得名刊不死之紫籙耶汝其無對者有司必執也映自强長嘯振褐撫髮爾乃整氣扉口叱咤而答曰大道無親惟善是與天地無心隨德乃矜是以坂泉流血無違龍髯之舉三苗丹野涿鹿絳草豈妨大聖靈化高通上達耶吾七世父許子阿者積仁著德陰加鳥獸遇凶荒之年人民飢饉加之疫癘百遺一口阿乃施散家財拯其衆庶親營方藥勤勞外舍臨人之喪如失其親救人之患如己之疾已死之命懸子阿手垂窮之身撫之如子度脫凶年賴阿而全者四百八人仁德不墜後當鍾我等是以功書上帝德刊靈閣使我祖根流宗澤廕光後緒故使垂條結華生而好仙應得度世者五人登升者三人録名太上策簡青宫豈是爾輩所可豫乎言畢魴等豁然而笑時司命君即遣中候李遵握火鈴而來呵攝之於是魴及白虎乃走去耳李遵未來之時映懼怖失膽亦喪氣矣亦賴其師王世龍助映為答到亦幾至敗也於是即得度名東宫當為仙之中者云梁乾化三年七月封歸一真君司命君大茅君也道權謝安字安石陳郡陽夏人世儒學行少有重名寓居會稽出則漁弋山水入則言咏屬文無處世意坐石室臨濬谷悠然嘆曰此亦伯夷何遠安善談莊老一日與攴許共集王濛家安顧謂諸人今日可謂彥會時既不可留此集固亦難常當共言咏以寫其懷許便問主人有莊子否正得漁父一篇謝看題便各請四坐通攴道林先通作七百許語叙致精麗才藻奇拔衆咸稱善於是各言懷畢安問曰卿等盡不皆曰今日之言少不自竭安後粗難因自叙其意作萬餘言才峰秀逸既自難千加意氣擬託蕭然自得四坐莫不厭心攴謂曰君一往奔詣故復自佳耳簡文帝時為相曰安石既與人同樂不得不與人同憂召之必至時弟萬總藩任之重安雖處衡門其名猶出萬之右自然有公輔之望年四十餘始有仕進志征西大將軍請為司馬將發新亭朝士咸送高嵩戲之曰卿屢違朝㫖高卧東山諸人每相與言安石不肯出將如蒼生何蒼生今亦將如卿何安後為相值晋室多故而能以雅量鎮物從容談笑折桓溫不軌之氣舉用群才破符堅百萬之師其功烈不在王導溫嶠之下安雖受朝寄東山之志始末不渝及出鎮新城盡室造泛海之裝欲領經略粗定自江道還東雅志未就而薨詔贈太傅謐文靖西山真德秀謂安石秉政十有六年始則遏强臣篡竊之謀終則挫强敵并吞之鋭其功偉矣然安石初心未嘗為功名計也其高情雅度庶幾乎孔明子房之風道品楊羲字義和吳郡人徙家句容晋咸和五年庚寅歲九月生幼而通靈美姿容善言笑工書畫與王右軍並名海內許先生邁長史穆年並懸殊而早結神明之交簡文帝為琅瑘王進位承相用長史薦為公府舍人及帝即位乃不求遷叙高蹈遺榮精思致感永和五年受中黃子制虎豹法六年從魏夫人長子劉璞傳靈寶五符時年二十一興寧三年六月感紫虛元君紫微夫人九華安妃降于家或降長史山廨廨在茅山所傳經誥轉使録示許君父子至是遂為長史傳經之師九華安妃應運為儷嘗告之曰明君夷質虛閒祕構玉朗蘭淵高流清響金宫所謂能珍寶藏奇幽真內焕標拂靈篇乘數順生素德神園丹金玉清興煙拔景冥鼓遐聲也必三事大夫侍宸帝躬高佐四輔承制聖君理生斷死賞罰鬼神攝命千靈封山召雲主察陰陽之和氣而加為吳越鬼神之君也三官中常有諺謡云楊安大君董真命神正我等之謂耳君將乘龍駕雲白日升天若其不耐風火之煙欲抱真形於幽林者且可尋劍解之道作告終之術乎自盡出默之會隱顯之迹臨時分處有任於明君矣西城總真王君又教服日月之華法簡文帝從而師之以太元十一年丙戌歲解駕年五十七宋宣和勑書曰朕存嬰霄府盼景龍臺瞻秀之神鄉企九華之妙誨欽厥列仙之躅昭茲闡化之功東華上佐司命揚真人積學洞微研心合漠得中黃之隱訣受南真之祕傳董司吳越之疆關總神靈之要方詡揚於至道宜褒極於隆名庶期冲鑒之臨永侈蕃祺之錫可特封洞靈顯化真人之號道品許穆字思玄一名謐汝南平輿人六世沮光徙居丹陽以永興二年乙丑歲生起家太學博士出於餘姚令徵為尚書郎遷郡中正護軍長史給事中散騎常侍外混世業內修真學嘗慕兄遠遊之高軌值簡文晏駕專靜山廬與楊君深結神明之契興寧中衆真降楊備傳經誥太元元年解化年七十二子姪禮窆虛柩於郭西大墓真誥云君挺命所基緣業已久乃周武王九宫上相長里薛公之弟兼許肇遺功復應垂祉後胤故乘運託生因資成道玉劄所授為上清真人爵登侯伯位編卿司理仙撫治佐聖牧民矣宣和勑書曰朕降總真之玉境陟耀景之龍臺爰授曆於無扃以濟生於下土凡著功於道品咸進位於仙宗上清真人許長史清素外融神明內得靈音斐暢密參群聖之遊欻駕超遙高佐上清之理方流羅於大梵宜崇配於德名庶昭丕佑之臨益廣無為之化可特封太元廣德真人道品許翽字道翔小字玉斧長史第三子也清穎瑩潔特絶世倫生咸康七年辛丑歲正月郡舉上計掾主簿祖司徒府辟掾並不赴立宅句曲之雷平山前密修上道興寧三年七月紫微夫人降教自是與衆真酬接書疏備修回無飛步二景儀璘之法嘗願早遊洞室不欲久停人世以太和五年庚午歲詣北洞告終北洞良常洞也時年三十耆舊相傳云掾在北洞石壇上燒香禮拜因伏而不起明旦視形如生茅小君㖟言許子乃能委形冥化從張鎮南之夜解鎮南即天師第三代系師魯也自此居方隅洞館常來四平方臺真誥云後十六年當度東華為上清仙公隱居稱為玄中真師者也宣和封混化元一真人誥詞曰紫極涵元雖鴻濛於一氣丹臺列籍實綜第於萬真凡褒位於仙宗蓋恢功於道甫東華侍晨上清仙公許真人研三神以觀妙凝九緯以挺生北洞告終自適幽人之介東華躡景獨超上相之遊雖高謝於世名其敢志於仁蔭尚期冲佑益闡元綱道隱劉驎之字子驥一字遺民南陽人少尚質素虛退寡欲不修儀操人莫之知好遊山澤志在遁逸嘗採藥衡山中深入忘返見一澗水水南有二大菌一菌閉一菌開水深廣不得過或說囷中皆仙方靈藥諸雜物驎之欲更尋索終不復知處也凡人致贈一無所受去驎之家百餘里有一孤姥病將死嘆息謂人曰誰當埋我惟有劉長史耳何由令知驎之先聞其有患故往候之值其命終乃身為營棺殯送之其仁愛惻隱如此一日聞武陵溪漁人得入桃花源欣然欲往未果尋而卒陶徵士記中稱為高尚士固可想其人矣道術索襲敦煌人也虛靖好學不應州郡之命舉孝廉賢良方正皆以疾辭遊思於陰陽之術著天文地理十餘篇多所啓發張茂時與敦煌太守陰淡奇而造焉經日忘返會病卒年七十九淡素服會葬贈錢二萬淡曰世人之所有餘者富貴也目之所好者五色也耳之所玩者五音也而先生棄衆人之所收收衆人之所棄味無味於恍惚之際兼重玄於衆妙之內宅不彌畝而志忽九州形居塵俗而栖心天外雖黔婁之高遠莊生之不願蔑以過也乃諡玄居先生真隱張忠字臣和中山人也永嘉之亂隱於泰山恬靜寡欲清虛服氣餐松餌术修導引之法不修經典勸教但以至道虛無為宗其居依重巖深谷鑿地為穴室弟子亦以穴居去忠六十餘步五日一朝其教以形不以言弟子受業觀形而退立道壇于穴上每旦朝拜之食用瓦器鑿石為釜左右居人饋之衣食一無所受好事者頗或問以水火之祥忠曰天不言而四時行焉萬物生焉陰陽之事非窮山野叟所知其遣諸外物類如此在期頤而視聽無爽符堅遣使召之賜以衣冠辭曰年朽髮落不堪衣冠請以野服入見堅謂之曰先生考槃山林研精道素獨善之美有餘兼濟之功未也故遠屈先生將任齊尚父忠曰昔因喪亂避地泰山與鳥獸為侣以全朝夕之命屬堯舜之世年衰志謝不堪展效尚父之况非敢竊擬山栖之性情存巖竇乞還餘齒歸死岱宗堅以安車送之行達華山嘆曰我東嶽道士殁於西嶽命也奈何行五十里及關而卒使者馳馹白之堅遣黃門郎韋華持節策吊賜命服諡曰安道先生道儒宋纖字令文敦煌效穀人也少有遠操沉靖不與世交隱居酒泉南山明究經緯弟子受業三千餘人酒泉太守馬岌高尚士也具威儀鳴鐃鼓造焉纖重樓深閣距而不見岌嘆曰先生名可聞而身不可見德可仰而形不可睹吾而今而後知先生人中龍也銘詩於石壁曰丹崖百丈青壁萬尋奇木蓊鬱蔚若鄧林其人如玉惟國之琛室邇人遠實勞我心卒時年八十三諡曰玄虛先生道默陶淡字處靜太尉侃之孫也幼孤好導養之術謂仙道可期年十五六便服食絶穀不昏娶家纍千金僮客百數淡終日端拱曾不營問頗好讀易善卜筮於長沙臨湘山中結廬居之養一白鹿以自偶親故有候之者輒移度澗水莫得近之州舉秀才淡遂轉逃羅縣埤山中終身不返莫知所矣道隱陶潜字淵明侃曾孫也少懷高尚博學善屬文穎脫不羇任真自得嘗著五柳先生傳以自况曰先生不知何許人也亦不詳其姓字宅邊有五柳樹因以為號焉閒靖少言不慕榮利好讀書不求甚解每有會意便欣然忘食性嗜酒家貧不能常得親舊知其如此或置酒而招之造飲輒盡其在必醉既醉而退曾不吝情去留環堵蕭然不蔽風日短褐穿結簞瓢屢空晏如也常著文章自娛頗示己志忘懷得失以此自終贊曰黔婁有言不戚戚於貧賤不汲汲於富貴極其言兹若人之儔乎酣暢賦詩以樂其志無懷氏之民歟葛天氏之民歟其自序如此時人以為實録自以曾祖晋氏宰輔恥復屈身後代自宋高祖王業漸隆不復肯仕所著文章皆題其年月義熙以前明書晋氏年號自永初以來唯云甲子而已嘗言五六月北窗下卧遇凉風暫至自謂是羲皇上人元嘉四年卒年六十三顔延年誄之諡曰靖節徵士道品陸修靜字元寂吳興東遷人父琳九徵不起諡高道處士先生跖有重輪足有雙踝掌有大字背有斗文篤好文籍旁究象緯及長好方外遊南詣衡湘九嶷訪南真之遺跡西至峨眉西城尋清虛之高躅宋元嘉末市藥京邑文帝召不往因還廬山明帝泰始三年詔江州刺史王景宗禮聘來朝敕住後堂又敕會于華林園之延賢館王公畢集先生鹿巾謁帝而升帝肅然加敬遂以殳季真取到楊許真人上清經法敕付先生總括三洞為世宗師仍敕北郊天印山立崇虛館為傳經宗壇明年帝疾即其館修金籙齊一夕有黃氣如寶蓋狀彌覆壇宇帝復感異夢疾良愈元徽五年正月忽若趨裝將還舊山弟子皆訝之乃三月二日倏然解化敕送冠履藏簡寂觀諡曰簡寂先生宣和贈丹元真人道言董京字威輦不知何郡人初與隴西計吏俱至洛陽被髮而行逍遙吟詠常宿白社中孫楚時為著作數就社中與語後數年遁去莫知所之於其寢處唯有一石竹子及詩二篇其一曰乾道剛簡坤體敦密芒芒太素是則是述末世流奔以文代質悠悠世事孰知其實逝將去此至虛歸我自然之室又曰孔子不遇時彼感麟麟乎麟胡不遁世以存真道化單道開敦煌人常衣粗褐或贈以繒服皆不著不畏寒暑晝夜不卧恆服細石子一吞數枚日一服或多或少好山居而山林諸神見異形試之無懼色石季龍時從西平來一日行百里至秦州表送到鄴季龍令佛圖澄與語不能屈也澄曰此道士觀國興衰若去者當有大亂及季龍末道開南渡許昌鄴中大亂升平三年至京師後至南海入羅浮山獨處茅茨蕭然物外年百餘歲卒于山舍敕弟子以居置石穴中弟子乃移入石室陳郡袁宏為南海太守登羅浮石室口見道開形骸如生香火瓦器猶存嘆曰法師行業殊群政當如蟬蛻耳乃為之贊云南史道隱宗炳字少文南陽人宋武帝既誅劉毅領荆州問毅府咨議參軍申永曰今日何施而可永曰除其宿釁倍其惠澤貫叙門次顯擢才能而已武帝納之乃辟炳為主簿不起問其故答曰栖丘飲谷三十餘年豈能折腰為趨走吏耶帝善其對而止炳妙善琴書圖畫精於言理每遊山水往輒忘歸兄臧為南平太守逼與俱還乃於江陵三湖立宅閒居無事召為太尉行參軍驃騎道憐命為記室並不就衡陽王義季為荆州親至其室與之歡宴命為咨議參軍終不起好山水愛遠遊西陟荆巫南登衡嶽因疾還江陵歎曰老疾俱至名山恐難遍睹唯澄懷觀道卧以遊之凡所遊履皆圖之於壁謂人曰鼓琴動操欲令衆山皆響古有金石弄為諸桓所重桓氏亡其聲遂絶唯炳傳焉文帝遣樂師楊歡就受之道儒沈道虔吳興武康人少仁愛好老易居縣北石山下精廬與諸孤兄子共釜庾之資困不改節受琴於戴達王敬弘深敬之州凡十二命皆不就有竊其園菜者外還見之仍自逃隱待竊去乃出又有拔其屋後大筍令人止之曰惜此筍欲得成林更有佳者相與乃遣買大筍送與之盜者慚不取道虔使置其門內而還鄉里少年相率受業道虔常無食以立學徒武康令孔欣之厚相資給受業者咸得有成文帝聞之遣使存問道虔年老蔬食恆無經日之資而琴書為樂孜孜不倦卒子慧鋒修其業不就州辟道隱劉凝之字隱安南郡枝江人也慕老萊嚴子陵為人拒其家財與弟及兄子立屋於野外非其力不食州里重其德行辟召並不就臨川王義慶衡陽王義季並遣使存問凝之答書頓首稱僕不修百姓禮人或譏焉凝之曰昔老萊向楚王稱僕嚴陵亦抗禮光武未聞巢許稱臣堯舜時荆州年飢義季慮凝之餒斃餉錢十萬凝之大喜將錢至市門觀有飢色者悉分與之俄頃立盡性好山水一旦携妻子泛江湖隱居衡山之陽登高嶺絶人跡為小屋居之採藥服食以終其身道隱褚伯玉字元璩吳郡錢唐人少有隱操寡嗜欲年十八父母為婚娶婦入前門伯玉從後門出遂往剡中居瀑布山性耐寒暑時人比之王仲都在三十餘年隔絶人物王僧虔為吳郡苦禮致之伯玉不得已停郡信宿才交數言而退高帝即位手詔吳會二郡以禮迎遣又辭疾上不欲重違其志勑於剡縣白石山立太平館居之卒年八十六伯玉常居一樓上仍葬樓所孔圭從其受道法為於館側立碑道儒顧歡字景怡一字玄年吳郡鹽官人年六七歲知推六甲家貧父使田中驅雀作黃雀賦而歸雀食稻過半父怒將撻之見賦乃止鄉中有學舍歡貧無受業於舍壁後倚聽無遺忘者夕則然松節讀書或然糠自照及長篤志不倦聞吳興東遷邵玄之能傳五經文句假為書師從之受業年二十餘更從豫章雷次宗咨玄儒諸義母亡水漿不入口六七日廬于墓次遂隱居不仕於剡中天台山開館聚徒受業常近百人性好黃老修服食不與人通每旦出户山禽集其掌取食兼解陰陽書為術數多效驗山陰白石村往往邪病村人告訴求哀於歡歡乃往村中為講老子病者皆愈又有病邪者問歡歡曰家有何書答曰唯有孝經歡曰可取仲尼居置病人枕邊恭敬之自瘥也病者果愈人問其故答曰善禳惡正勝邪病所以瘥孔圭嘗登嶺尋歡共談四本歡曰夫中理唯一豈容有二四本無正失中故也於是著三名論以正之歡口不辨長於著論又注王弼易二繫學者傳之齊高帝輔政後為揚州主簿及踐祚乃至稱山谷臣進政綱一卷優詔稱美東歸賜麈尾素琴知將終賦詩言志曰五塗無恆宅三清有恆舍精氣因天行遊魂隨物化鵾鵬適大海蜩鳩之桑柘達生任去留善死均日夜委命安所乘何方不可駕翹心企前覺融然從此謝自剋死日自擇葬時卒於剡山時年六十四身體香軟蓋尸解仙化焉還葬舊墓木連理生於墓側縣令江山圖表狀道儒杜京産字景齊吳郡錢唐人也少恬靜閉意榮宦博涉文義專修黃老與同郡顧歡同契於始寧東山開舍授學建武初徵為員外散騎侍郎之職京産曰莊生持釣豈為白屋所回竟辭疾不就卒道質宗測字敬微宋徵士炳之孫也測少靜退不樂人間常嘆曰家貧親老不擇官而仕先哲以為美談余竊有惑誠不能潜感地金冥致江鯉但當用天之道分地之利孰能食人重祿憂人重事乎驃騎豫章王嶷辟為參軍測答府召云何為謬傷海鳥橫斤山木豫王復遣書請之測答曰性同鱗羽愛止山壑眷戀松雲輕迷人路縱宕巖流有若狂者忽不知老至而今鬢髮已白豈容課虛責有限魚鳥慕哉欲遊名山乃寫祖炳所作尚子平圖於壁上測長子賔官在京師知父此㫖便求祿還為南郡丞測遂付以家事刺史安陸王子敬長史劉寅以下皆贈送之測無所受唯齎老莊二書自隨子孫拜辭悲泣測長嘯不視遂往廬山止祖炳舊宅魚復侯子響為江州厚遣贈遺測曰少有狂疾尋山採藥遠來至此量腹而進松术度形而衣薛蘿淡然已足豈容當此橫施子響命駕造之測避不見唯與同志庾易劉虬宗人尚之等往來講說建武二年徵為司徒主簿不就卒測善晝自圖阮籍遇孫登於行鄣坐卧對之兼好音律善易老續皇甫謐高士傳三卷又嘗著衡山廬山志云道儒沈麟士字雲禎吳興武康人幼而俊敏年七歲聽叔父嶽言玄賔散言無所遺失嶽撫其肩曰若斯文不絶其在爾乎及長博通經史有高尚之心晦于邑之餘不溪家貧以織簾為業誦書口不息鄉人號為織簾先生精於禮傳嘗自話訓鄉曲或勸之仕答曰魚縣獸檻天下一契聖人玄感所以每履吉先吾誠未能景行坐忘何為不希企曰損乃作玄散賦以絶之講經教授從學士數十百人各營屋宇居止其側時人為之語曰吳羌山中有賢士開門教授居城市宗人吏部郎中淵中書郎約等並表薦麟士義行徵為著作郎不就乃與約等書曰名者實之賔本所不庶中央無心空勤南北為惠反凶將在於斯年過八十猶手鈔燈下細書復成二三千卷時人以為養身靜默所致製黑賦以寄意注周易兩繫莊子內篇老子要略與他經數十卷卒于家年八十五臨終遺教依皇甫玄晏棺中貯孝經一卷穿壙二尺置棺不設几位四時他席玄酒而奠子彝奉而行之吳郡陸惠曉張融皆為之誄唐刺史顔真卿撰沈氏述祖德記表慶樹于祖碑以旌其美焉墓在金鵝山道質庾易字幼簡新野人也志性恬靜不交外物臨川王映臨州表薦餉麥百斛易謂使人曰走樵採麋鹿之伍終身毛褐馳騁日月之車保自耕之祿於大王之恩亦已深矣固辭不受以文義自樂安西長史袁彖欽其風贈以鹿角書格蚌盤研白象牙筆並贈詩曰白日清明青天寥亮昔聞巢許今睹臺尚易以連理几竹翹書格報之建武三年詔徵為司空主簿不就卒道儒庾承先字子通潁川塢陵人也沉靜有志是非不涉於言喜愠不形於色人莫能窺也玄經祕典靡不該綜九流七略咸所精練乃與道士王僧鎮同遊衡嶽鄱陽忠烈王欽其風味要與遊處令講老子遠近名士咸來赴集論難鋒起承先徐相酬答皆得所未聞中大通三年盧山劉慧斐至荆州承先與之有舊往從之荆峽學徒因請講老子湘東王命駕臨聽還山王親祖道並贈篇什道品陶弘景字通明秣陵人也十歲得葛洪神仙傳讀之謂人曰仰青雲睹白日不覺為遠矣神儀明秀朗目疏眉細形長額聳耳右膝有數十黑子作七星文讀書萬餘卷一事不知以為深耻善琴棋工草隸未弱冠齊高帝作相引為侍讀除奉朝請先生故事多所取焉家貧求宰縣不遂永明十年脫朝服掛神武門上表辭祿詔許之賜以東帛敕所在月給茯苓五斤白蜜二升以供服餌及發公卿祖之征虜亭咸云宋齊以來未有斯事於是止於句容之句曲山乃山中立館自號華陽隱居人間書劄即以隱居代名始從東陽孫遊嶽受符圖經法遍歷江左諸名山訪求楊許諸真跡嘗謂門人曰吾見朱門廣厦雖識其華樂而無欲往之心望高巖瞰大澤知此難立正自恆欲就之且永明中求祿得輒差舛若不爾安得為今日之事先生為人圓通謙謹出處冥會心如明鏡遇物便了言無煩舛有亦隨覺永元初更築三層樓弟子賔客居其下與物遂絶特愛松風欣然聞其響有時獨遊泉領望見者以為仙人性好著述尚奇異尤明陰陽五行風角星算山川地理方圓産物醫術本草帝代歷年嘗造渾天象高三尺許地居中央天轉而地不動以機動之悉與天會云修道所須也深慕張良為人云古賢無比齊末為讖曰水刃木為梁及梁武兵至薪城遣弟子戴猛之假道奉表及聞議禪代先生授引圖讖數家皆成梁字令弟子進之帝既早與之遊即位恩禮逾篤先生已得神符祕訣神丹屢成而輟帝每給藥物又服所製飛丹有驗益敬重之得所上書燒香虔受帝使造年曆至己巳歲而加朱點實太清三年也帝手敕招之錫以鹿皮巾唯畫兩牛以答一牛散放水草間一牛著金籠頭有人執繩以杖驅之帝笑曰此人無所不作欲斆曳尾之龜豈有可致之理國家大事無不前以咨詢月中常有數信時人謂為山中宰相天監四年移居積金東澗以修上道自隱處四十許年年逾八十而有壯容仙書云眼方者壽千歲先生末年一眼有時而方既妙解術數逆知梁祚將覆預製詩云夷甫任散誕平叔坐論空豈應昭陽殿化作單于宫祕詩在篋化去後門人方稍出之太同末士人競談玄理不習武事比侯景篡果在昭陽殿逆期先知去日為告逝篇大同二年卒年八十一贈中散大夫諡貞白先生所著山世書數百卷弟子受法者三千餘人從子栩撰華陽隱居陶先生本起録吳興謝瀹撰陶先生小傳李渤撰梁茅山貞白先生傳賈嵩撰蓬萊都水監陶真人內傳宣和封宗元翊教真人誥誥詞曰朕膺琅霄之景命握龍漢之寶符蓋將敷暢靈音恢崇道化闡微言於至教薦休命於列真蓬萊都水監陶隱居振跡榮羅濯精華闕神交無纍跡雖相於山中誠感夙通賦已仙於海上顧德名之莫擬豈妙蔭之敢忘尚都顯號之榮永介涵生之祉玄品録卷之三
